// 1. Recupera la lista (Default: VUOTA)
    function getRssInterests() {
      const saved = localStorage.getItem("keblo_rss_interests");
      return saved ? JSON.parse(saved) : []; 
    }

// 2. Aggiunge un nuovo interesse (CON LIMITE MAX 7)
    function addRssInterest(cardId) {
      const input = document.getElementById(`new-tag-${cardId}`);
      const topic = input.value.trim();
      if (!topic) return;

      const interests = getRssInterests();
      
      // BLOCCO LIMITE 7
      if (interests.length >= 7) {
        alert("Limite raggiunto! Puoi seguire massimo 7 argomenti. Rimuovine uno per aggiungerne altri.");
        return;
      }
      
      // Evita duplicati
      if (!interests.includes(topic)) {
        interests.unshift(topic); // Aggiunge in cima
        localStorage.setItem("keblo_rss_interests", JSON.stringify(interests));
        
        renderRssTags(cardId);
        input.value = "";
        
        // Carica subito notizie sul nuovo topic
        filterRss(cardId, topic);
      }
    }
    //2.5 Funziona per rimuovere un RSS 
    // --- FUNZIONE PER RIMUOVERE UN INTERESSE RSS ---
function removeRssInterest(cardId, topic) {
  // 1. Recupera la lista attuale
  let interests = getRssInterests();

  // 2. Filtra la lista togliendo quello selezionato
  interests = interests.filter(t => t !== topic);

  // 3. Salva la nuova lista nel localStorage
  localStorage.setItem("keblo_rss_interests", JSON.stringify(interests));

  // 4. Aggiorna la grafica dei tag nella card
  renderRssTags(cardId);

  // 5. Se non ci sono più interessi, pulisci il feed, altrimenti ricarica
  const listContainer = document.getElementById(`rss-feed-${cardId}`);
  if (interests.length > 0) {
    loadAllFeeds(cardId, interests);
  } else {
    listContainer.innerHTML = `
      <div style="text-align:center; padding:40px; opacity:0.4;">
         <div style="font-size:30px; margin-bottom:10px;">📭</div>
         <div style="font-size:10px;">NESSUN FEED ATTIVO</div>
      </div>`;
  }
  
  logToCard(cardId, `Interesse rimosso: ${topic}`);
}
    
// 3. Rinomina  un interesse (Uguale a prima    // Funzione per modificare un tag esistente
    function renameRssInterest(cardId, oldTopic) {
      // Apre una finestrella per cambiare nome
      const newTopic = prompt(`Modifica argomento "${oldTopic}":`, oldTopic);
      
      // Se l'utente ha scritto qualcosa ed è diverso da prima
      if (newTopic && newTopic.trim() !== "" && newTopic !== oldTopic) {
        let interests = getRssInterests();
        
        // Trova l'indice del vecchio tag e sostituiscilo
        const index = interests.indexOf(oldTopic);
        if (index !== -1) {
          interests[index] = newTopic.trim();
          localStorage.setItem("keblo_rss_interests", JSON.stringify(interests));
          
          // Aggiorna la grafica
          renderRssTags(cardId);
          
          // Carica subito le notizie del nuovo nome
          filterRss(cardId, newTopic.trim());
        }
      }
}

async function triggerVision(tipo) {
    // 1. Prendiamo il testo dall'ultima risposta del Core
    const testoKeblo = document.getElementById("nexus-out-text").innerText;
    const mascot = document.getElementById("keblo-mascot");
    
    if (!testoKeblo) return alert("Nessun testo da visualizzare.");

    mascot.classList.add("busy");
    
    try {
        const response = await fetch("/api/generate-image", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                prompt: testoKeblo, 
                visionType: tipo 
            })
        });
        const data = await response.json();

        if (data.ok) {
            // 🚀 FIX: Cerchiamo la card Vision attiva
            const visionCard = document.querySelector('.card.vision');
            if (visionCard) {
                // Cerchiamo il nuovo contenitore della galleria
                const resDiv = document.getElementById(`v-res-${visionCard.id}`);
                
                if (resDiv) {
                    // Se c'è ancora la scritta di standby, la puliamo
                    if (resDiv.innerText.includes("READY_FOR_BATCH")) resDiv.innerHTML = "";

                    // Creiamo l'immagine e la aggiungiamo in CIMA (prepend) alla galleria
                    const img = document.createElement('img');
                    img.src = `${data.url}?t=${Date.now()}`;
                    img.style.cssText = "width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; border:1px solid rgba(255,255,255,0.1); cursor:pointer;";
                    img.onclick = () => window.open(img.src);
                    
                    resDiv.prepend(img); // La nuova immagine appare per prima
                    
                    // Se la card Vision è chiusa nel dock, la riapriamo in automatico
                    if (visionCard.classList.contains('minimized-to-dock')) {
                        const dockItem = document.getElementById(`dock-item-${visionCard.id}`);
                        if(dockItem) dockItem.click();
                    }
                }
            }
            console.log("Visione inviata dal Core alla Galleria!");
        }
    } catch (e) {
        console.error("Errore collegamento Vision Core:", e);
    } finally {
        mascot.classList.remove("busy");
    }
}

// 1. Carica lo storico
// --- FUNZIONI DIARIO PULITE ---
function getDiaryTimeAgo(dateStr) {
  if (!dateStr) return "tempo ignoto";
  const now = new Date();
  const then = new Date(dateStr);
  const diffInMs = now - then;
  const diffInMins = Math.floor(diffInMs / 60000);

  if (diffInMins < 1) return "proprio ora";
  if (diffInMins < 60) return `${diffInMins} min fa`;
  if (diffInMins < 1440) return `${Math.floor(diffInMins / 60)} ore fa`;
  if (diffInMins < 2880) return "ieri";
  
  // Se è più vecchio di 2 giorni, mettiamo la data semplice
  return then.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
}

//Funzione rendedRss
function renderRssList(cardId, newsArray) {
  const listContainer = document.getElementById(`rss-feed-${cardId}`);
  if(!listContainer) return;

  // Ordina per data (se possibile) o mischia per effetto "feed vivo"
  // Qui mischiamo per non avere blocchi monolitici
  newsArray.sort(() => 0.5 - Math.random());

  listContainer.innerHTML = newsArray.map(item => {
    // Formattiamo la data in modo breve
    let timeStr = "";
    if (item.date) {
      const d = new Date(item.date);
      timeStr = `${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
    }

    return `
      <div class="rss-item">
        <div class="rss-meta" style="margin-bottom:2px; color:#6366f1;">
          <span>${item.source.toUpperCase()}</span>
          <span>${timeStr}</span>
        </div>
        <!-- Cliccando il titolo si apre il Reader Interno -->
        <div class="rss-title" onclick="openDeepReader('${item.link}', '${item.title.replace(/'/g, "\\'")}')">
          ${item.title}
        </div>
      </div>
    `;
  }).join('');
  
  logToCard(cardId, `Feed aggiornato: ${newsArray.length} nuove notizie.`);
}

// 🚀 AGGIUNGI ANCHE QUESTA FUNZIONE SOTTO
async function runFactCheck(cardId, title) {
  const resDiv = document.getElementById(`fc-res-${cardId}`);
  const summaryText = document.querySelector(`#content-${cardId} .reader-text`).innerText;
  
  resDiv.style.display = "block";
  resDiv.innerHTML = `<div class="loading-spinner" style="width:12px; height:12px;"></div> <span style="font-size:10px; font-weight:900; letter-spacing:1px; margin-left:10px;">ANALISI CROSS-SOURCE IN CORSO...</span>`;

  try {
    const res = await fetch("/api/fact-check", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, originalSummary: summaryText })
    });
    const data = await res.json();
    
    if (data.ok) {
      resDiv.innerHTML = `
        <div style="font-size:9px; font-weight:900; color:#a855f7; margin-bottom:8px; letter-spacing:1.5px; text-transform:uppercase;">🛡️ Fact-Check Report:</div>
        <div style="color:rgba(233, 213, 255, 0.9);">${typeof marked !== 'undefined' ? marked.parse(data.report) : data.report}</div>
      `;
         logToCard(cardId, `Verifica fonti completata per: ${title.substring(0,30)}...`, "FACT_CHECK_SHIELD", {
        engine: "3090_INTEL",
        result: "REPORT_GENERATED",
        security: "ACTIVE"
    });
    } else {
      resDiv.innerHTML = "⚠️ Impossibile completare la verifica al momento.";
    }
  } catch (e) {
    resDiv.innerHTML = "⚠️ Errore di connessione al modulo Intelligence.";
  }
}

// --- OROLOGIO IN TEMPO REALE ---
function startSystemClock() {
      const timeEl = document.getElementById('clock-time');
      const dateEl = document.getElementById('clock-date');
      
      // Controllo di sicurezza: se non trova gli elementi, riprova tra poco
      if (!timeEl || !dateEl) {
        console.warn("Clock elements not found, retrying...");
        setTimeout(startSystemClock, 500);
        return;
      }

      function update() {
        const now = new Date();
        
        // ORARIO
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        timeEl.innerText = `${hours}:${minutes}`;

        // DATA
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        // Mettiamo la prima lettera maiuscola per eleganza
        let dateStr = now.toLocaleDateString('it-IT', options);
        dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
        
        dateEl.innerText = dateStr;
      }

      update(); // Aggiorna subito
      setInterval(update, 1000); // Poi ogni secondo
    }

// Funzione filtro manuale (clic sui tag in alto)
async function filterRss(cardId, topic) {
  const listContainer = document.getElementById(`rss-feed-${cardId}`);
  listContainer.innerHTML = `<div class="loading-spinner"></div> Caricamento ${topic}...`;
  
  // Evidenzia il tag
  const tags = document.getElementById(`rss-tags-${cardId}`).children;
  for(let t of tags) t.classList.remove('active');
  event.target.classList.add('active');

  // Carica solo quel topic
  loadAllFeeds(cardId, [topic]); 
  // Nota: loadAllFeeds è fatta per array, gli passiamo un array di 1 elemento
}
