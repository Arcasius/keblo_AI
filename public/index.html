<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Keblo – Dashboard AI</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <div id="dock"></div>
  <style>
   /* ============================================================
   KEBLO UI — CLEAN CSS (A: draggable absolute cards)
   - Tokens -> Components -> Card Variants -> Stations
   ============================================================ */

/* ---------------------------
   0) TOKENS / BASE
---------------------------- */
:root{
  /* motion */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --t-fast: 140ms;
  --t-med: 220ms;
  --t-slow: 420ms;

  /* layers */
  --z-cards: 100;
  --z-dock: 10000;
  --z-overlay: 9999;

  /* radius */
  --r-1: 10px;
  --r-2: 14px;
  --r-3: 22px;

  /* spacing */
  --s-1: 6px;
  --s-2: 10px;
  --s-3: 14px;
  --s-4: 18px;
  --s-5: 24px;

  /* typography */
  --font-ui: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

  /* colors (base) */
  --bg-0: #0b1020;
  --bg-1: rgba(255,255,255,0.07);
  --bg-2: rgba(0,0,0,0.25);
  --border: rgba(255,255,255,0.18);
  --text: rgba(255,255,255,0.92);
  --muted: rgba(255,255,255,0.55);

  /* glass */
  --glass-blur: 18px;
  --shadow-soft: 0 25px 55px rgba(0,0,0,0.42);
  --shadow-hard: 0 35px 85px rgba(0,0,0,0.55);

  /* focus ring */
  --focus-ring: 0 0 0 4px rgba(34, 211, 238, 0.18);

  /* accents per card type */
  --a-chat: #6366f1;
  --a-memo: #22d3ee;
  --a-rss: #0ea5e9;
  --a-core: #38bdf8;
  --a-event: #a855f7;
  --a-intel: #00ffcc;
  --a-search: #8b5cf6;
  --a-upload: #3b82f6;
  --a-news: #ef4444;
  --a-reader: #38bdf8;
  --a-journal: #d946ef;
  --a-vision: #f472b6;
  --a-orbitale: #14b8a6;
}

/* grain overlay */
body::before{
  content:"";
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.06'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:-1;
  mix-blend-mode: overlay;
}

html, body{
  height:100%;
}

body{
  margin:0;
  font-family: var(--font-ui);
  color: var(--text);
  overflow:hidden;
  background:
    radial-gradient(1000px 700px at 10% 10%, rgba(99,102,241,0.18), transparent 55%),
    radial-gradient(900px 650px at 90% 30%, rgba(34,211,238,0.14), transparent 55%),
    radial-gradient(1100px 800px at 50% 100%, rgba(168,85,247,0.12), transparent 60%),
    radial-gradient(ellipse at 0% 0%, #334155 0%, #0b1020 55%, #070a12 100%);
}

/* scrollbars */
::-webkit-scrollbar{ width:6px; height:6px; }
::-webkit-scrollbar-track{ background: rgba(0,0,0,0.12); }
::-webkit-scrollbar-thumb{ background: rgba(255,255,255,0.22); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover{ background: rgba(255,255,255,0.38); }

/* ---------------------------
   1) LOGIN OVERLAY
---------------------------- */
#login-overlay{
  position: fixed;
  inset: 0;
  z-index: var(--z-overlay);
  display:flex;
  align-items:center;
  justify-content:center;
  background: radial-gradient(circle at top, #1e293b, #020617);
  backdrop-filter: blur(18px);
  transition: opacity var(--t-slow) var(--ease-out);
}

.login-box{
  width: 320px;
  padding: 40px;
  text-align:center;
  border-radius: 24px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 25px 55px rgba(0,0,0,0.55);
}

.login-box input{
  width:100%;
  box-sizing:border-box;
  margin-bottom: 14px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(0,0,0,0.28);
  color: white;
  outline:none;
}
.login-box input:focus{
  border-color: rgba(59,130,246,0.55);
  box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
}
.login-box button{
  width:100%;
  padding: 12px;
  border-radius: 12px;
  border:none;
  cursor:pointer;
  font-weight: 900;
  background: #3b82f6;
  color: white;
}

/* ---------------------------
   2) SYSTEM CLOCK
---------------------------- */
#system-clock{
  position: fixed;
  top: 26px;
  right: 34px;
  text-align:right;
  z-index: 0;
  pointer-events:none;
  text-shadow: 0 2px 12px rgba(0,0,0,0.35);
}
#clock-time{
  font-size: 46px;
  font-weight: 220;
  letter-spacing: -2px;
  line-height: 1;
  color: rgba(255,255,255,0.92);
}
#clock-date{
  margin-top: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
}

/* ---------------------------
   3) DOCK
---------------------------- */
#dock {
  position: fixed;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  z-index: var(--z-dock);

  display: flex;
  flex-direction: column;
  gap: 8px;                 /* Ridotto lo spazio tra le voci */
  padding: 10px;

  /* RIMOSSI SFONDO E BORDI DEL CONTENITORE */
  background: none;
  border: none;
  backdrop-filter: none;
  box-shadow: none;

  opacity: 0;
  pointer-events: none;
  transition: all var(--t-slow) var(--ease-out);
}

#dock.active {
  opacity: 1;
  pointer-events: auto;
  left: 30px;
}

.dock-item {
  width: auto;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
  user-select: none;

  font-size: 11px;          /* Leggermente più grande per leggibilità */
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;

  /* TESTO PULITO SENZA RIQUADRO */
  color: rgba(255, 255, 255, 0.6); /* Più sobrio in idle */
  background: none;
  border: none;

  display: flex;
  align-items: center;
  gap: 12px;
  
  transition: all var(--t-fast) var(--ease-out);
  text-shadow: 0 2px 10px rgba(0,0,0,0.5); /* Per leggere su sfondi chiari */
}

/* EFFETTO HOVER: Illumina solo il testo e lo sposta */
.dock-item:hover {
  transform: translateX(8px);
  color: rgba(255, 255, 255, 1);
  background: rgba(255, 255, 255, 0.05); /* Un leggerissimo velo al passaggio */
}

/* Se vuoi che il pallino si illumini di più al passaggio */
.dock-item:hover span, 
.dock-item:hover i {
  filter: brightness(1.5) drop-shadow(0 0 8px currentColor);
}

/* Rimosso il ::before precedente per evitare il doppio pallino */
.dock-item::before {
  display: none;
}

/* ---------------------------
   4) CARD BASE (draggable absolute)
---------------------------- */
.card{
  position: absolute;
  width: 340px;
  height: 300px;
  min-width: 250px;
  min-height: 150px;

  z-index: var(--z-cards);
  cursor: move;
  resize: both;
  overflow: hidden;
  background: none !important;
  border: none !important;
  box-shadow: none !important;

  perspective: 1000px;
  transform: translateZ(0);
}

/* state helpers */
.card.minimized-to-dock{
  transform: translateY(100vh) scale(0) !important;
  opacity: 0 !important;
  pointer-events:none !important;
  visibility:hidden !important;
  transition: all var(--t-slow) var(--ease-out) !important;
}

.card.is-dragging *{
  transition: none !important; /* zero lag mentre trascini */
}

/* flip system */
.card-inner{
  position: relative;
  width:100%;
  height:100%;
  transform-style: preserve-3d;
  transition: transform 600ms var(--ease-smooth);
}
.card.flipped .card-inner{ transform: rotateY(180deg); }

.card-front, .card-back{
  position:absolute;
  inset:0;

  display:flex;
  flex-direction: column;

  border-radius: var(--r-3);
  padding: 14px;
  box-sizing:border-box;

  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;

  overflow:hidden;

  /* glass default */
  background: var(--bg-1);
  backdrop-filter: blur(var(--glass-blur)) saturate(160%);
  border: 1px solid var(--border);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.18),
    inset 0 -1px 0 rgba(0,0,0,0.32),
    var(--shadow-soft),
    0 0 30px rgba(120,119,198,0.18);
}

.card-back{
  transform: rotateY(180deg);
  background: rgba(15,23,42,0.92);
}

/* texture overlay for both */
.card-front::after, .card-back::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  border-radius: inherit;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.06), transparent 70%);
  mix-blend-mode: overlay;
  opacity: 1;
}

/* common typography inside */
.card-front, .card-back,
.card-front *, .card-back *{
  color: rgba(255,255,255,0.90);
}
/* Applica il colore agli elementi interni solo se non hanno un colore proprio */
.card-front :not([style*="color"]), .card-back :not([style*="color"]) {
  color: inherit;
}

.card-title{
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.95;
  padding-right: 72px; /* spazio per bottoni */
  margin-bottom: 10px;
  position: relative;
  z-index: 2;
}

/* control buttons (minimize / flip) */
.minimize-card, .flip-btn{
  position:absolute;
  top: 12px;
  z-index: 110;
  width: 28px;
  height: 28px;
  border-radius: 10px;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;
  user-select:none;
  background: rgba(0,0,0,0.26);
  border: 1px solid rgba(255,255,255,0.12);

  transition: transform var(--t-fast) var(--ease-out),
              background var(--t-fast) var(--ease-out);
}
.minimize-card{ right: 12px; }
.flip-btn{ right: 46px; font-size: 12px; }

.minimize-card:hover, .flip-btn:hover{
  background: rgba(255,255,255,0.10);
  transform: translateY(-1px);
}

/* hide close button if exists */
.close-card{ display:none !important; }

/* content area */
.card-content{
  position: relative;
  z-index: 2;
  flex: 1;
  min-height: 0;
  display:flex;
  flex-direction: column;
  gap: 10px;
  overflow:hidden;
}

/* hover polish */
.card:hover .card-front,
.card:hover .card-back{
  border-color: rgba(255,255,255,0.28);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.22),
    inset 0 -1px 0 rgba(0,0,0,0.36),
    var(--shadow-hard),
    0 0 42px rgba(120,119,198,0.22);
}

/* ---------------------------
   5) FORMS / BUTTONS
---------------------------- */
.card-q{
  width:100%;
  box-sizing:border-box;
  border-radius: var(--r-2);
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(0,0,0,0.22);
  color: var(--text);
  padding: 10px 12px;
  outline:none;
  transition: box-shadow var(--t-fast) var(--ease-out),
              border-color var(--t-fast) var(--ease-out),
              background var(--t-fast) var(--ease-out);
  font-size: 12px;
}
.card-q:focus{
  border-color: color-mix(in srgb, var(--accent, #22d3ee) 45%, rgba(255,255,255,0.18));
  box-shadow: var(--focus-ring);
  background: rgba(0,0,0,0.28);
}

.card-btn{
  width:100%;
  padding: 10px 12px;
  border-radius: var(--r-2);
  border:none;
  cursor:pointer;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-size: 10px;
  color: #0b1020;
  background: color-mix(in srgb, var(--accent, #60a5fa) 75%, white);
  transition: transform var(--t-fast) var(--ease-out),
              filter var(--t-fast) var(--ease-out);
}
.card-btn:hover{
  transform: translateY(-1px);
  filter: brightness(1.06);
}
.card-btn:active{
  transform: translateY(0) scale(0.99);
}

/* ---------------------------
   6) STREAM RESULT (one canonical)
---------------------------- */
.stream-result{
  flex: 1;
  min-height: 60px;
  overflow: auto;

  padding: 14px;
  border-radius: var(--r-2);

  background: rgba(0,0,0,0.26);
  border: 1px solid rgba(255,255,255,0.08);

  font-family: var(--font-ui);
  font-size: 0.88em;
  line-height: 1.45;
  white-space: normal;
  word-break: break-word;
}

/* nice HTML inside stream */
.stream-result h3{
  margin: 12px 0 6px 0;
  font-size: 1.08em;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding-bottom: 4px;
}
.stream-result p{ margin: 0 0 10px 0; }
.stream-result ul, .stream-result ol{ margin: 0 0 10px 18px; padding:0; }
.stream-result li{ margin-bottom: 4px; color: rgba(255,255,255,0.78); }
.stream-result b, .stream-result strong{
  color: color-mix(in srgb, var(--accent, #22d3ee) 80%, white);
  font-weight: 700;
}
.stream-result pre{
  background: rgba(0,0,0,0.34);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 10px;
  overflow:auto;
  font-family: var(--font-mono);
  font-size: 12px;
}

/* ---------------------------
   7) HISTORY LIST (retro logs)
---------------------------- */
.history-list{
  flex: 1;
  min-height: 0;
  overflow:auto;

  margin-top: 10px;
  padding: 10px;

  border-radius: var(--r-2);
  background: rgba(0,0,0,0.30);
  border: 1px solid rgba(255,255,255,0.06);

  font-family: var(--font-mono);
  font-size: 11px;
  color: rgba(148,163,184,0.95);
  line-height: 1.5;
}

.history-item{
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  word-wrap: break-word;
}
.history-item:last-child{
  border-bottom:none;
  margin-bottom:0;
  padding-bottom:0;
}

/* ---------------------------
   8) TOKEN INFO (tiny)
---------------------------- */
#tokenInfo{
  margin-top: 10px;
  font-size: 10px;
  opacity: 0.45;
  letter-spacing: 1px;
  text-transform: uppercase;
  text-align:center;
  width:100%;
  transition: opacity var(--t-med) var(--ease-out);
}
#tokenInfo:hover{ opacity: 0.85; }

/* ============================================================
   9) CARD VARIANTS (ACCENT + glow)
   (Only one place controls border/glow per station)
   ============================================================ */

.card.chat{ --accent: var(--a-chat); }
.card.memo{ --accent: var(--a-memo); }
.card.rss{ --accent: var(--a-rss); }
.card.core{ --accent: var(--a-core); }
.card.event{ --accent: var(--a-event); }
.card.intelligence{ --accent: var(--a-intel); }
.card.search{ --accent: var(--a-search); }
.card.file_upload{ --accent: var(--a-upload); }
.card.news{ --accent: var(--a-news); }
.card.reader{ --accent: var(--a-reader); }
.card.journal{ --accent: var(--a-journal); }
.card.vision{ --accent: var(--a-vision); }
.card.orbitale_memory{ --accent: var(--a-orbitale); }

/* apply accent to surfaces */
.card.chat .card-front, .card.chat .card-back,
.card.memo .card-front, .card.memo .card-back,
.card.rss .card-front, .card.rss .card-back,
.card.core .card-front, .card.core .card-back,
.card.event .card-front, .card.event .card-back,
.card.intelligence .card-front, .card.intelligence .card-back,
.card.search .card-front, .card.search .card-back,
.card.file_upload .card-front, .card.file_upload .card-back,
.card.news .card-front, .card.news .card-back,
.card.reader .card-front, .card.reader .card-back,
.card.journal .card-front, .card.journal .card-back,
.card.vision .card-front, .card.vision .card-back,
.card.orbitale_memory .card-front, .card.orbitale_memory .card-back{
  border-color: color-mix(in srgb, var(--accent) 55%, rgba(255,255,255,0.16));
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.18),
    inset 0 -1px 0 rgba(0,0,0,0.32),
    var(--shadow-soft),
    0 0 34px color-mix(in srgb, var(--accent) 28%, transparent);
}

/* title tint */
.card.chat .card-title,
.card.memo .card-title,
.card.rss .card-title,
.card.core .card-title,
.card.event .card-title,
.card.intelligence .card-title,
.card.search .card-title,
.card.file_upload .card-title,
.card.news .card-title,
.card.reader .card-title,
.card.journal .card-title,
.card.vision .card-title,
.card.orbitale_memory .card-title{
  color: color-mix(in srgb, var(--accent) 78%, rgba(255,255,255,0.92));
  text-shadow: 0 0 10px color-mix(in srgb, var(--accent) 30%, transparent);
}

/* ============================================================
   10) STATIONS (specific internal layouts)
   ============================================================ */
/* ============================================================
   10.001 EVENT STATION (KEBLO HUD VERSION)
   ============================================================ */

/* Contenitore Split */
.agenda-split {
  display: flex;
  gap: 20px;
  height: 100%;
  padding: 5px;
}

/* Colonna Calendario (Sinistra) */
.calendar-section {
  width: 215px; 
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}

/* Griglia Calendario */
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  padding: 10px;
  background: rgba(0, 0, 0, 0.25);
  border-radius: var(--r-2);
  border: 1px solid rgba(255,255,255,0.05);
}

.cal-day-name {
  font-size: 8px;
  opacity: 0.4;
  text-align: center;
  font-weight: 900;
  text-transform: uppercase;
  padding-bottom: 5px;
}

.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-family: var(--font-mono); /* Look tecnico */
  border-radius: 6px;
  cursor: pointer;
  transition: all var(--t-fast) var(--ease-out);
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid transparent;
}

.cal-day:hover {
  background: rgba(168, 85, 247, 0.2);
  border-color: rgba(168, 85, 247, 0.3);
}

/* Giorno selezionato (Quello che clicchi) */
.cal-day.selected {
  background: rgba(168, 85, 247, 0.3) !important;
  border: 1px solid #a855f7 !important;
  color: #fff;
  box-shadow: 0 0 12px rgba(168, 85, 247, 0.4);
}

/* Giorno con impegni (Puntino sotto) */
.cal-day.has-event {
  position: relative;
  color: #a855f7;
  font-weight: 900;
}
.cal-day.has-event::after {
  content: '';
  position: absolute;
  bottom: 3px;
  width: 3px;
  height: 3px;
  background: #a855f7;
  border-radius: 50%;
  box-shadow: 0 0 5px #a855f7;
}

.cal-day.today {
  background: var(--a-event);
  color: white;
  font-weight: bold;
  box-shadow: 0 0 15px color-mix(in srgb, var(--a-event) 50%, transparent);
}

/* Colonna Timeline (Destra) */
.timeline-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: rgba(0, 0, 0, 0.3);
  border-radius: var(--r-3);
  padding: 15px;
  min-width: 0;
  border: 1px solid rgba(168, 85, 247, 0.15);
  box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
}

/* Card degli impegni */
.event-card {
  background: linear-gradient(90deg, rgba(168, 85, 247, 0.08) 0%, rgba(255,255,255,0.02) 100%);
  border: 1px solid rgba(255,255,255,0.05);
  border-left: 3px solid #a855f7;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  transition: transform 0.2s ease;
}
.event-card:hover { transform: translateX(4px); background: rgba(168, 85, 247, 0.12); }

/* Header e Input */
.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 1px;
  margin-bottom: 10px;
}

.agenda-input-wrapper {
  display: flex;
  gap: 8px;
  background: rgba(0,0,0,0.4);
  padding: 6px;
  border-radius: 12px;
  border: 1px solid rgba(168, 85, 247, 0.2);
}

/* 🛰️ RADAR SATELLITE - MOUSE PASS-THROUGH FIX */
/* Forza il "passaggio" del mouse attraverso i layer della card */
.card.radar .card-inner,
.card.radar .card-front,
.card.radar .card-content {
    pointer-events: none !important; /* Il mouse "passa oltre" questi contenitori */
}

/* Forza l'iframe a ricevere il mouse */
.card.radar iframe,
.card.radar .radar-frame-wrap {
    pointer-events: auto !important; /* L'iframe cattura i clic */
    position: relative;
    z-index: 10; /* Lo mettiamo sopra tutto */
}

/* Rimuoviamo eventuali layer decorativi che coprono la mappa */
.card.radar .card-front::before,

/* 10.2 MEMO STATION */
/* 10.2 MEMO STATION (Rich Text Version) */
.card.memo .card-content {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  padding: 0 !important;
  display: flex;
  flex-direction: column;
}

.memo-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: rgba(0, 0, 0, 0.2);
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  flex-shrink: 0;
}

/* Pulsanti Colore */
.memo-color-btn {
  width: 16px !important;
  height: 16px !important;
  border-radius: 50%;
  cursor: pointer;
  border: 1px solid rgba(255, 255, 255, 0.3);
  transition: transform 0.1s ease;
  display: inline-block;
  user-select: none; /* Impedisce di selezionare il bottone stesso */
}

.memo-color-btn:hover {
  transform: scale(1.3);
  border-color: white;
}
.memo-toolbar button, .memo-toolbar div {
  pointer-events: auto !important; /* Forza la cliccabilità */
}
.memo-editor {
  flex: 1;
  min-height: 0;
  width: 100%;
  box-sizing: border-box;
  background: rgba(0, 0, 0, 0.22);
  color: rgba(241, 245, 249, 0.96);
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.5;
  padding: 14px;
  outline: none;
  overflow-y: auto;
  word-wrap: break-word;
  box-shadow: inset 0 2px 8px rgba(0,0,0,0.4);
  
  /* FIX PER EVIDENZIARE IL TESTO */
  cursor: text !important;
  pointer-events: auto !important;
  user-select: text !important; 
  -webkit-user-select: text !important;
}

.memo-editor:focus {
  background: rgba(0, 0, 0, 0.28);
}

.memo-footer {
  height: 22px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 9px;
  font-weight: 800;
  color: rgba(255, 255, 255, 0.3);
  padding: 0 10px;
  background: rgba(0,0,0,0.1);
}

.memo-status {
  letter-spacing: 1px;
  text-transform: uppercase;
}
/* Sidebar interna allo Scratchpad */
.memo-main-layout { display: flex; height: 100%; width: 100%; overflow: hidden; }

.memo-resizer {
  width: 4px;
  background: rgba(255, 255, 255, 0.08); /* Una linea sottile e discreta */
  cursor: col-resize;
  flex-shrink: 0;
  transition: background 0.2s;
  z-index: 10;
}

.memo-resizer:hover, .memo-resizer.active {
  background: var(--a-memo); /* Si illumina di azzurro al passaggio */
  box-shadow: 0 0 8px var(--a-memo);
}

.memo-sidebar {
 /* width: 120px;*/
  background: rgba(0, 0, 0, 0.35);
  border-right: none !important;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.memo-sidebar-header {
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.add-page-btn {
  width: 100%;
  padding: 5px;
  background: rgba(74, 222, 128, 0.1);
  border: 1px dashed rgba(74, 222, 128, 0.4);
  color: #4ade80;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  font-weight: bold;
}

.memo-page-list {
  flex: 1;
  overflow-y: auto;
}

.memo-page-item {
  padding: 10px 8px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255, 255, 255, 0.03);
  opacity: 0.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: all 0.2s;
}

.memo-page-item:hover, .memo-page-item.active {
  opacity: 1;
  background: rgba(99, 102, 241, 0.15);
  color: #22d3ee;
  border-left: 3px solid #22d3ee;
}

.memo-editor-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0; /* Importante per non sballare il flex */
}

/* 10.3 RSS STATION */
.rss-container{
  display:flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
  overflow:hidden;
}
.rss-tags-bar{
  padding: 10px;
  display:flex;
  gap: 6px;
  overflow-x:auto;
  white-space: nowrap;
  border-bottom: 1px solid rgba(255,255,255,0.10);
}
.rss-tag{
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 999px;
  cursor:pointer;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 900;
  user-select:none;

  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(148,163,184,0.95);
  transition: background var(--t-fast) var(--ease-out),
              border-color var(--t-fast) var(--ease-out),
              transform var(--t-fast) var(--ease-out);
}
.rss-tag:hover{ transform: translateY(-1px); background: rgba(255,255,255,0.10); }
.rss-tag.active{
  border-color: rgba(99,102,241,0.55);
  background: rgba(99,102,241,0.18);
  color: rgba(255,255,255,0.92);
  box-shadow: 0 0 14px rgba(99,102,241,0.18);
}
.rss-list{
  flex: 1;
  min-height: 0;
  overflow:auto;
  padding: 10px;
}
.rss-item{
  padding: 10px;
  margin-bottom: 8px;
  border-radius: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-left: 3px solid rgba(14,165,233,0.55);
  transition: transform var(--t-fast) var(--ease-out),
              background var(--t-fast) var(--ease-out);
}
.rss-item:hover{ transform: translateX(3px); background: rgba(255,255,255,0.07); }
.rss-title{
  font-size: 12px;
  font-weight: 600;
  line-height: 1.35;
  cursor:pointer;
  color: rgba(226,232,240,0.95);
}
.rss-title:hover{ text-decoration: underline; color: rgba(165,180,252,0.98); }
.rss-meta{
  margin-top: 4px;
  font-size: 10px;
  color: rgba(255,255,255,0.45);
  display:flex;
  justify-content: space-between;
}
/* Immagini dentro l'AI Report */
.report-img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
  margin: 10px 0;
  border: 1px solid rgba(255,255,255,0.1);

.report-img:hover { transform: scale(1.02); border-color: #6366f1; }

.report-source {

  padding: 4px 10px;

  border-radius: 6px;
  color: #818cf8;
  font-size: 10px;
  font-weight: 900;
  text-decoration: none;

.report-news-title {
  color: #22d3ee;
  font-weight: 900;
  font-size: 13px;
  margin-top: 15px;

  border-left: 3px solid #22d3ee;
  padding-left: 10px;
}

/* 10.4 JOURNAL (timeline feed) */
.card.journal .card-content{
  padding: 0 !important;
  flex: 1;
  min-height: 0;
  overflow:hidden;
}
.diary-feed{
  flex: 1;
  min-height: 0;
  overflow:auto;
  padding: 16px;
  display:flex;
  flex-direction: column-reverse;
  gap: 18px;
  position: relative;
  scrollbar-width: thin;
}
.diary-feed::before{
  content:'';
  position:absolute;
  left: 22px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: rgba(99,102,241,0.18);
}
.timeline-entry{
  position: relative;
  padding-left: 40px;
  z-index: 1;
  width:100%;
  box-sizing:border-box;
}
.timeline-dot{
  position:absolute;
  left: 17px;
  top: 8px;
  width: 10px;
  height: 10px;
  border-radius: 999px;
  background: rgba(99,102,241,0.95);
  border: 3px solid rgba(15,23,42,0.85);
  box-shadow: 0 0 14px rgba(99,102,241,0.65);
}
.timeline-time{
  font-size: 10px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: rgba(129,140,248,0.95);
  margin-bottom: 6px;
}
.timeline-card{
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 16px;
  padding: 14px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.22);
}
.timeline-user-msg{
  font-size: 13px;
  color: rgba(224,231,255,0.95);
  line-height: 1.5;
  margin-bottom: 10px;
}
.timeline-ai-msg{
  font-size: 12px;
  color: rgba(148,163,184,0.95);
  font-style: italic;
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

/* 10.5 VISION (Flux display) */
.vision-display{
  width: 100%;
  aspect-ratio: 1;
  border-radius: 16px;
  overflow:hidden;
  background: rgba(0,0,0,0.26);
  border: 1px solid rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
  justify-content:center;
}
.vision-display img{
  width:100%;
  height:100%;
  object-fit: cover;
  cursor:pointer;
}
/* Griglia per le immagini generate */
.vision-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 10px;
  margin-top: 15px;
  overflow-y: auto;
  flex: 1;
  padding-right: 5px;
}

.vision-gallery img {
  width: 100%;
  aspect-ratio: 1;
  object-fit: cover;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  transition: transform 0.2s, border-color 0.2s;
}

.vision-gallery img:hover {
  transform: scale(1.05);
  border-color: #f472b6; /* Rosa Vision */
}

/* Chips per la quantità */
.batch-selector {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}
.batch-chip {
  flex: 1;
  padding: 5px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(244, 114, 182, 0.3);
  border-radius: 6px;
  color: #f472b6;
  font-size: 9px;
  font-weight: 900;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.batch-chip.active {
  background: #f472b6;
  color: #0b1020;
}
/* Selettore Aspect Ratio */
.ratio-selector {
  display: flex;
  gap: 5px;
  margin-bottom: 12px;
}
.ratio-btn {
  flex: 1;
  padding: 4px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(244, 114, 182, 0.2);
  border-radius: 4px;
  font-size: 8px;
  color: #f472b6;
  cursor: pointer;
  text-align: center;
  font-weight: 900;
}
.ratio-btn.active {
  background: rgba(244, 114, 182, 0.2);
  border-color: #f472b6;
  box-shadow: 0 0 10px rgba(244, 114, 182, 0.2);
}

/* Toggle AI Refiner */

window.KebloOS = {
    state: {
        activeNodes: {},     // Stato delle card
        lastInference: null,  // Dati dell'ultima operazione AI

    // Funzione principale per emettere eventi
    emit(cardId, type, message, meta = {}) {
        const timestamp = new Date().toLocaleTimeString('it-IT');
        
        // 1. Aggiorna lo stato globale per il Core
        this.state.activeContext[cardId] = { type, message, meta, timestamp };
        this.state.lastInference = { cardId, type, timestamp, ...meta };

        // 3. Debug Console

    // Disegna il log tecnico sul retro della card
    updateRetro(cardId, data) {
        const historyList = document.getElementById(`history-${cardId}`);

    async function refreshFileList(cardId) {
      const container = document.getElementById(`content-${cardId}`);
      if (!container) return;
      try {
        const r = await fetch('/api/user-files', { credentials: 'include' });
        const data = await r.json();
        const listHtml = data.files.map(f => `
          <div class="file-row">
            <div style="display:flex; align-items:center; flex:1;">
              <input type="radio" name="file-${cardId}" value="${f}" id="${f}-${cardId}">
              <label for="${f}-${cardId}" style="margin-left:8px; cursor:pointer;">${f}</label>
            </div>
            <span class="del-file-btn" onclick="deleteFile('${f}', '${cardId}')">🗑️</span>
          </div>`).join('');
        container.innerHTML = `
          <div class="file-list">${listHtml || "Nessun file"}</div>
          <input type="text" class="card-q" placeholder="Cosa cerchi?" id="q-${cardId}">
          <button class="card-btn" onclick="runCardSearch('${cardId}')">ANALIZZA</button>
          <div class="stream-result" id="res-${cardId}"></div>`;
      } catch (e) { container.innerHTML = "⚠️ Errore sessione."; }
    }

    async function deleteFile(fileName, cardId) {
      if (!confirm(`Eliminare ${fileName}?`)) return;
      await fetch('/api/delete-file', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fileName }) });
      refreshFileList(cardId);
      const sbList = document.querySelector('[id^="sandboxList_"]');
      if (sbList) refreshSandboxFileList(sbList.id.split('_')[1]);
      logToCard(cardId, `File eliminato: ${fileName}`);
    }

    // --- LOGICA SANDBOX ---
    async function refreshSandboxFileList(cardId) {
      const listDiv = document.getElementById(`sandboxList_${cardId}`);
      if (!listDiv) return;
      try {
        const r = await fetch('/api/user-files', { credentials: 'include' });
        const data = await r.json();
        listDiv.innerHTML = data.files.length === 0 ? "<div style='opacity:0.5;text-align:center;'>Sandbox vuota</div>" : data.files.map(f => `
          <div class="sandbox-file-item">
            <span>📄 ${f.length > 20 ? f.substring(0,17)+'...' : f}</span>
            <span style="cursor:pointer; opacity:0.6;" onclick="deleteFileFromSandbox('${f}', '${cardId}')">✕</span>
          </div>`).join('');
      } catch (e) {}
    }

    async function deleteFileFromSandbox(fileName, cardId) {
      if (!confirm(`Eliminare ${fileName}?`)) return;
      await fetch('/api/delete-file', { method: 'DELETE', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ fileName }) });
      refreshSandboxFileList(cardId);
      const anCard = document.querySelector('.card.search');
      if (anCard) refreshFileList(anCard.id);
      logToCard(cardId, `File eliminato dalla sandbox: ${fileName}`);
    }

    async function uploadFile(input, cardId) {
      const file = input.files[0]; if (!file) return;
      const btn = document.getElementById(`uploadBtn_${cardId}`);
      btn.disabled = true; btn.innerHTML = `<div class="loading-spinner"></div> Invio...`;
      const fd = new FormData(); fd.append("file", file);
      try {
        const res = await fetch("/api/upload", { method: "POST", credentials: "include", body: fd });
        const data = await res.json();
        if (data.ok) {
          refreshSandboxFileList(cardId);
          const anCard = document.querySelector('.card.search'); if (anCard) refreshFileList(anCard.id);
          setTimeout(() => { btn.disabled = false; btn.innerHTML = "📁 Scegli File"; }, 1000);
          logToCard(cardId, `Nuovo file caricato: ${file.name}`);
        } else { alert(data.msg); btn.disabled = false; btn.innerHTML = "📁 Scegli File"; }
      } catch (e) { btn.disabled = false; btn.innerHTML = "📁 Scegli File"; }
    }
    // --- SISTEMA VOCALE GLOBALE KEBLO ---
window.KebloVoice = {
    audio: new Audio(),
    isPlaying: false,

    async speak(text, btnElement = null) {
        if (this.isPlaying) {
            this.audio.pause();
            this.isPlaying = false;
            if (btnElement) btnElement.innerHTML = "🔊";
            return;
        }

        if (btnElement) btnElement.innerHTML = "🌀"; // Animazione caricamento

        try {
            const res = await fetch("/api/tts", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: text.substring(0, 1000) }) // Max 1000 caratteri per volta
            });
            const data = await res.json();

            if (data.ok) {
                this.audio.src = data.url;
                this.audio.play();
                this.isPlaying = true;
                if (btnElement) btnElement.innerHTML = "⏹️";

                this.audio.onended = () => {
                    this.isPlaying = false;
                    if (btnElement) btnElement.innerHTML = "🔊";
                };
            }
        } catch (e) {
            console.error("Errore Voce:", e);
            if (btnElement) btnElement.innerHTML = "⚠️";
        }
    }
};

  async function runNewsInference(cardId) {
  const topic = document.getElementById(`q-${cardId}`).value;
  const resDiv = document.getElementById(`res-${cardId}`);
  if (!topic) return alert("Inserisci un argomento.");
  
  logToCard(cardId, `Analisi profonda avviata su: ${topic}`);
  
  resDiv.innerHTML = `
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; opacity:0.6;">
      <div class="loading-spinner" style="width:30px; height:30px; border-width:3px;"></div>
      <div style="margin-top:15px; font-size:10px; letter-spacing:2px; font-weight:900;">GENERAZIONE REPORT...</div>
    </div>`;

  try {
    const response = await fetch("/api/news-inference", { 
      method: "POST", 
      headers: { "Content-Type": "application/json" }, 
      credentials: "include",
      body: JSON.stringify({ topic }) 
    });
    const data = await response.json();
    
    resDiv.style.opacity = 0;
    setTimeout(() => {
      // --- 🚀 FIX DEFINITIVO RENDERING ---
      let rawHTML = data.content;

      // 1. Rimuoviamo i blocchi "```html" o "```" che l'AI mette per abitudine
      let cleanHTML = rawHTML.replace(/```html/g, "").replace(/```/g, "").trim();

      // 2. Inseriamo DIRETTAMENTE l'HTML (senza marked.parse)
      resDiv.innerHTML = cleanHTML;
      
      // 3. Applichiamo le classi alle immagini e link nel caso l'AI se le sia dimenticate
      resDiv.querySelectorAll('img').forEach(img => img.classList.add('news-report-img'));
      resDiv.querySelectorAll('a').forEach(a => a.classList.add('news-report-link'));
      
      resDiv.style.opacity = 1;
      resDiv.scrollTop = 0;
    }, 200);
    
  } catch (e) { 
    resDiv.innerHTML = "⚠️ Errore durante l'analisi web."; 
  }
}

    const resDiv = document.getElementById(`res-${cardId}`);
    
    // 2. Controllo sicurezza
    if (files.length === 0) return alert("Seleziona almeno un file per l'analisi.");
    if (!q) return alert("Inserisci una domanda.");
    
    logToCard(cardId, `Analisi multi-file avviata su ${files.length} documenti.`);
    resDiv.innerHTML = "<em>Keblo sta incrociando i dati dei file selezionati...</em>";
    
    try {
        const response = await fetch('/api/card-search-stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ fileNames: files, query: q, cardId})
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let sseBuffer = ""; 
        let fullHTML = ""; 

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            sseBuffer += decoder.decode(value, { stream: true });
            const lines = sseBuffer.split('\n\n'); 
            sseBuffer = lines.pop();
            
            for (const line of lines) {
              if (line.startsWith('data: ')) {
                  try {
                      const data = JSON.parse(line.substring(6));

                      // 1. Chunk HTML normale
                      if (data.text) {
                          fullHTML += data.text;
                          resDiv.innerHTML = fullHTML;
                      }

                      // 2. Log tecnico/debug dal backend
                      if (data.type === "debug_log") {
                          logToCard(
                              cardId,
                              `${data.title} | exact=${data.payload.exact_hits}, lexical=${data.payload.lexical_hits}, reranked=${data.payload.reranked_hits}, fused=${data.payload.fused_hits}`
                          );
                      }

                      // 3. Errore backend
                      if (data.error) {
                          resDiv.innerHTML = `<span style="color:red">Errore: ${data.error}</span>`;
                      }

                  } catch (e) {
                      console.log("Errore parsing chunk");
                  }
              }
          }
                      
            resDiv.scrollTop = resDiv.scrollHeight;
        }
          logToCard(cardId, `Analisi multi-file completata su ${files.length} documenti`, "INTEL_INFERENCE", {
            engine: "Qwen 27B",
            gpu: "RTX_5090",
            context: "8k_tokens",
            files_analyzed: files.length
        });

        // --- 🚀 TASTO ESPORTAZIONE (Appare a fine analisi) ---
  // --- 🚀 FIX: DOPPIO TASTO (VOCE + SALVA) ---
        if (fullHTML && fullHTML.length > 10) {
            const actionsId = `actions-${cardId}`;
            
            if (!document.getElementById(actionsId)) {
                // Creiamo un contenitore flex per tenere i bottoni affiancati
                const btnBox = document.createElement('div');
                btnBox.id = actionsId;
                btnBox.style.cssText = "display:flex; gap:10px; margin-top:20px; width:100%;";

                // 1. TASTO VOCE (Legge l'analisi completa)
                const voiceBtn = document.createElement('button');
                voiceBtn.className = 'card-btn';
                voiceBtn.style.cssText = "background:#22d3ee; color:#0b1020; font-weight:900; flex:1;";
                voiceBtn.innerHTML = "🔊 LEGGI ANALISI";
                voiceBtn.onclick = () => {
                    // Estraiamo solo il testo della ricerca (ignorando i tasti stessi)
                    const researchText = resDiv.innerText.split('🔊')[0].trim();
                    window.KebloVoice.speak(researchText, voiceBtn);
                };

                // 2. TASTO ESPORTAZIONE (Salva nello Scratchpad)
                const exportBtn = document.createElement('button');
                exportBtn.className = 'card-btn';
                exportBtn.style.cssText = "background:#4ade80; color:#0b1020; font-weight:900; flex:1;";
                exportBtn.innerHTML = "💾 SALVA REPORT";
                
                exportBtn.onclick = async () => {
                    exportBtn.disabled = true;
                    exportBtn.innerHTML = "SALVATAGGIO...";
                    try {
                        const res = await fetch("/api/export-to-scratchpad", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ 
                                title: "REPORT: " + q.substring(0, 25) + "...", 
                                content: fullHTML 
                            })
                        });
                        const result = await res.json();
                        if (result.ok) {
                            exportBtn.style.background = "#22d3ee";
                            exportBtn.innerHTML = "✅ SALVATO";
                            logToCard(cardId, "Report esportato nello Scratchpad.");
                            window.dispatchEvent(new CustomEvent('refresh-scratchpad'));
                        }
                    } catch (err) {
                        exportBtn.disabled = false;
                        exportBtn.innerHTML = "⚠️ ERRORE";
                    }
                };

                // Aggiungiamo i bottoni al contenitore e il contenitore al div dei risultati
                btnBox.appendChild(voiceBtn);
                btnBox.appendChild(exportBtn);
                resDiv.appendChild(btnBox);
                
                resDiv.scrollTop = resDiv.scrollHeight;
            }
        }} catch (err) {
        resDiv.innerHTML = "<strong>Errore di connessione.</strong>";
    }
}

    if (e.clientX > rect.right - 25 && e.clientY > rect.bottom - 25) return;

    __Drag.offsetY = e.clientY - rect.top;

  });

async function sendNexusMessage(text, files = []) {
  const placeholder = document.getElementById("nexus-placeholder");
  const outText = document.getElementById("nexus-out-text");
  const mascot = document.getElementById("keblo-mascot");
  const tkInfo = document.getElementById("nexus-token-info");
  const dashboard = document.getElementById("nexus-dashboard");
  const vControls = document.getElementById("v-controls");
  const confBar = document.getElementById("confidence-bar");

  mascot.classList.add("busy");
  if (dashboard) dashboard.style.display = "flex";

  if (tkInfo) {
    tkInfo.innerHTML = `
      <div style="display:flex; align-items:center; gap:8px; opacity:0.6;">
        <div class="loading-spinner" style="width:10px; height:10px; border-width:2px;"></div>
        <span style="font-size:9px; letter-spacing:1px; color:#818cf8; font-family:var(--font-mono);">ANALYZING...</span>
      </div>
    `;
  }

  const chatCard = document.querySelector('.card.chat');
  const historyList = chatCard ? document.getElementById(`history-${chatCard.id}`) : null;

  if (historyList) {
    const time = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    const logItem = document.createElement('div');
    logItem.className = 'history-item';
    logItem.style.borderLeft = "2px solid var(--a-chat)";
    logItem.style.paddingLeft = "10px";
    logItem.innerHTML = `
      <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
        <span style="color:var(--a-chat); font-weight:900; font-size:9px;">>>> PROMPT</span>
        <span style="opacity:0.3; font-size:8px;">${time}</span>
      </div>
      <div style="font-family:var(--font-mono); font-size:11px; opacity:0.8;">${text || "[immagine allegata]"}</div>
    `;
    historyList.prepend(logItem);
  }

  if (placeholder) placeholder.style.display = "none";
  outText.style.display = "block";
  outText.innerHTML = `<span class="loading-spinner"></span>`;

  let accumulatedText = "";
  let receivedAnyText = false;

  try {
    // 1. Upload immagini selezionate
    const images = [];

    for (const file of files) {
      const fd = new FormData();
      fd.append("file", file);

      const upRes = await fetch("/api/upload", {
        method: "POST",
        credentials: "include",
        body: fd
      });

      const upData = await upRes.json();

      if (upData.ok) {
        images.push({
          name: file.name,
          path: upData.filePath || upData.path || upData.savedPath,
          mime: file.type || "image/jpeg"
        });
      }
    }

    // 2. Invio chat con testo + immagini
    const response = await fetch("/api/chat", {
      credentials: "include",
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        text,
        images
      })
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const parts = buffer.split('\n\n');
      buffer = parts.pop();

      for (const part of parts) {
        if (!part.startsWith('data: ')) continue;

        try {
          const data = JSON.parse(part.substring(6).trim());

          if (data.type === "chunk" && data.text) {
            if (!receivedAnyText) {
              outText.innerHTML = "";
              receivedAnyText = true;
            }

            accumulatedText += data.text;
            outText.innerHTML = typeof marked !== 'undefined'
              ? marked.parse(accumulatedText)
              : accumulatedText;

            const display = document.getElementById("nexus-display");
            if (display) display.scrollTop = display.scrollHeight;
          }

          if (data.type === "done") {
            const finalReply = accumulatedText || data.reply || "";
            mascot.classList.remove("busy");

            if (historyList) {
              const logRes = document.createElement('div');
              logRes.className = 'history-item';
              logRes.style.borderLeft = "2px solid #4ade80";
              logRes.style.paddingLeft = "10px";
              logRes.style.marginTop = "5px";
              logRes.style.background = "rgba(74, 222, 128, 0.03)";
              logRes.innerHTML = `
                <div style="color:#4ade80; font-weight:900; font-size:9px; margin-bottom:4px;"><<< RESPONSE</div>
                <div style="font-family:var(--font-mono); font-size:10px; opacity:0.6;">${finalReply.substring(0, 300)}...</div>
              `;
              historyList.prepend(logRes);
            }

            const newMood = data.mood || 'calm';
            const targetHue = moodPalette[newMood] || 180;
            emotionalMemory.hue = (emotionalMemory.hue * 0.6) + (targetHue * 0.4);

            if (newMood !== 'calm') {
              emotionalMemory.saturation = Math.min(emotionalMemory.saturation + 0.5, 8);
              emotionalMemory.brightness = Math.max(emotionalMemory.brightness - 0.05, 0.7);
            } else {
              emotionalMemory.saturation = Math.max(emotionalMemory.saturation - 0.3, 1);
              emotionalMemory.brightness = Math.min(emotionalMemory.brightness + 0.05, 1.1);
            }

            mascot.style.filter = `sepia(1) saturate(${emotionalMemory.saturation}) hue-rotate(${emotionalMemory.hue - 50}deg) brightness(${emotionalMemory.brightness}) drop-shadow(0 0 20px hsla(${emotionalMemory.hue}, 100%, 50%, 0.4))`;

            if (tkInfo && data.meta) {
              tkInfo.innerHTML = `
                <div style="display:flex; gap:4px;">
                  <span style="color:#22d3ee; border:1px solid rgba(34,211,238,0.2); padding:2px 5px; border-radius:4px; font-size:12px; font-weight:900;">${data.meta.promptTokens || 0}<small>IN</small></span>
                  <span style="color:#818cf8; border:1px solid rgba(129,140,248,0.2); padding:2px 5px; border-radius:4px; font-size:12px; font-weight:900;">${(data.meta.tokenUsed || 0) - (data.meta.promptTokens || 0)}<small>OUT</small></span>
                  <span style="color:#4ade80; border:1px solid rgba(74,222,128,0.2); padding:2px 5px; border-radius:4px; font-size:12px; font-weight:900;">⚡${data.meta.speed || "0.00"}</span>
                </div>
              `;
            }

            if (vControls) vControls.style.display = "flex";
            if (confBar) confBar.style.display = "flex";
            if (data.card) spawnCard(data.card.type, data.card.title, data.card.content);
            window.lastAssistantTs = data.ts;
          }

          if (data.type === "error") {
            outText.innerHTML = `<span style="color:#ef4444;">${data.message || "ERRORE DI CONNESSIONE AL NEXUS."}</span>`;
            mascot.classList.remove("busy");
          }
        } catch (e) {
          console.error("Errore parse chunk:", e);
        }
      }
    }
  } catch (err) {
    outText.innerHTML = `<span style="color:#ef4444;">ERRORE DI CONNESSIONE AL NEXUS.</span>`;
    mascot.classList.remove("busy");
  }
}
// Funzione helper per la compressione
  async function compressScratchpadImage(file) {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (event) => {
        const img = new Image();
        img.src = event.target.result;
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 800; // Ridimensionamento massimo per appunti
          let width = img.width;
          let height = img.height;

          if (width > MAX_WIDTH) {
            height *= MAX_WIDTH / width;
            width = MAX_WIDTH;
          }

          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          // WebP a 0.7 di qualità: è leggerissimo ma si vede benissimo
          resolve(canvas.toDataURL('image/webp', 0.7));
        };
      };
    });
  }

        if (parts[0].length === 4) {

    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function orbitaleShortId(id) {
  const value = String(id || "");
  return value.length > 14 ? value.slice(0, 14) + "..." : value;
}

function orbitaleNumber(value, fallback = 0) {
  const number = Number(value);
  return Number.isFinite(number) ? number : fallback;
}

function orbitaleFormatScore(value) {
  if (value === null || value === undefined || value === "") return "-";
  const number = Number(value);
  return Number.isFinite(number) ? number.toFixed(2) : String(value);
}

function orbitaleDateValue(value) {
  if (!value) return null;
  const date = new Date(value);
  return Number.isNaN(date.getTime()) ? null : date;
}

function orbitaleFormatTimestamp(value) {
  const date = orbitaleDateValue(value);
  if (!date) return value ? String(value) : "";
  return date.toLocaleString();
}

function orbitaleMemoryText(node, limit = 120) {
  const text = String(node?.text || node?.content?.text || node?.label || node?.id || "").replace(/\s+/g, " ").trim();
  return text.length > limit ? text.slice(0, limit - 3) + "..." : text;
}

function orbitaleTags(tags, limit = 4) {
  return Array.isArray(tags) ? tags.filter(Boolean).slice(0, limit) : [];
}

function orbitaleNodeRole(node) {
  return node?.role || node?.content?.role || "unknown";
}

function orbitaleNodeOrbit(node) {
  return node?.orbit || node?.orbitalLevel || "unknown";
}

function orbitaleNodeDepth(node) {
  return node?.depth || node?.memoryDepth || "unknown";
}

function orbitaleNodeImportance(node) {
  return orbitaleNumber(node?.importance ?? node?.meta?.importance, 0);
}

function orbitaleRoleColor(role) {
  if (role === "user") return "#38bdf8";
  if (role === "assistant") return "#14b8a6";
  return "#94a3b8";
}

function orbitaleSemanticColor(node) {
  const tags = orbitaleTags(node?.tags, 50).map(tag => String(tag).toLowerCase());
  const semanticColors = [
    { tag: "health", color: "#ef4444" },
    { tag: "project", color: "#38bdf8" },
    { tag: "memory", color: "#a78bfa" },
    { tag: "family", color: "#22c55e" },
    { tag: "research", color: "#facc15" },
    { tag: "learning", color: "#fb923c" },
    { tag: "general", color: "#94a3b8" }
  ];
  const match = semanticColors.find(item => tags.some(tag => tag === item.tag || tag.includes(item.tag)));
  return match ? match.color : orbitaleRoleColor(orbitaleNodeRole(node));
}

function orbitaleVisualRadius(node, linkCount) {
  const visualWeight = orbitaleNumber(node?.activation, 0) + orbitaleNodeImportance(node) + (linkCount * 0.05);
  return Math.max(8, Math.min(26, 8 + visualWeight * 8));
}

function orbitaleOrbitRadius(orbit) {
  if (orbit === "short") return 90;
  if (orbit === "medium") return 160;
  return 230;
}

function orbitaleBuildGraphLayout(nodes) {
  const buckets = { short: [], medium: [], long: [], unknown: [] };
  nodes.forEach((node, index) => {
    const nodeOrbit = orbitaleNodeOrbit(node);
    const orbit = buckets[nodeOrbit] ? nodeOrbit : "unknown";
    buckets[orbit].push({ node, index });
  });

  const positions = new Map();
  Object.entries(buckets).forEach(([orbit, bucket]) => {
    const radius = orbitaleOrbitRadius(orbit);
    const total = Math.max(bucket.length, 1);
    bucket.forEach((entry, orbitIndex) => {
      const angle = ((orbitIndex / total) * Math.PI * 2) - (Math.PI / 2);
      positions.set(entry.node.id, {
        x: 300 + Math.cos(angle) * radius,
        y: 280 + Math.sin(angle) * radius
      });
    });
  });

  return positions;
}

function renderOrbitGraphCard(target, nodes, links) {

    target.innerHTML = orbitaleEmptyMessage();

  }

  const nodeIds = new Set(nodes.map(node => node.id).filter(Boolean));
  const nodesById = new Map(nodes.filter(node => node?.id).map(node => [node.id, node]));
  const validLinks = links.filter(link => link && nodeIds.has(link.source) && nodeIds.has(link.target));
  const visibleLinks = validLinks.slice(0, 80);
  const linkCounts = new Map(nodes.map(node => [node.id, 0]));
  validLinks.forEach(link => {
    linkCounts.set(link.source, (linkCounts.get(link.source) || 0) + 1);
    linkCounts.set(link.target, (linkCounts.get(link.target) || 0) + 1);
  });

  const positions = orbitaleBuildGraphLayout(nodes);
  const orbitLines = [

    { orbit: "medium", color: "rgba(20,184,166,0.22)" },
    { orbit: "long", color: "rgba(244,114,182,0.20)" }
  ];

  let selectedNodeId = target.dataset.orbitaleSelectedNode || "";
  if (!nodeIds.has(selectedNodeId)) selectedNodeId = "";
  target.dataset.orbitaleSelectedNode = selectedNodeId;

  const connectedNodeIds = new Set();
  const selectedLinks = selectedNodeId ? validLinks.filter(link => {
    const connected = link.source === selectedNodeId || link.target === selectedNodeId;
    if (connected) {
      connectedNodeIds.add(link.source);
      connectedNodeIds.add(link.target);
    }
    return connected;
  }) : [];
  const selectedLinkIds = new Set(selectedLinks.map(link => link.id || `${link.source}|${link.target}`));

  const nodeFocusOpacity = (nodeId) => {
    if (!selectedNodeId) return 1;
    return nodeId === selectedNodeId || connectedNodeIds.has(nodeId) ? 1 : 0.15;
  };

  const linkFocusOpacity = (link) => {
    if (!selectedNodeId) return 1;
    const linkId = link.id || `${link.source}|${link.target}`;
    return selectedLinkIds.has(linkId) ? 1 : 0.15;
  };

  const renderInspector = (nodeId) => {
    const node = nodesById.get(nodeId);
    if (!node) {
      return `
        <div style="height:100%; display:flex; align-items:center; justify-content:center; color:rgba(226,232,240,0.58); font-size:11px; text-align:center; padding:16px;">
          Seleziona un nodo
        </div>
      `;

function renderActiveCoreCard(target, nodes) {
  if (!target) return;
  if (!nodes.length) {
    target.innerHTML = orbitaleEmptyMessage();
    return;
  }

  const topNodes = nodes.slice().sort((left, right) => {
    const activationDelta = orbitaleNumber(right.activation, -1) - orbitaleNumber(left.activation, -1);
    if (activationDelta) return activationDelta;
    const importanceDelta = orbitaleNumber(right.importance, -1) - orbitaleNumber(left.importance, -1);
    if (importanceDelta) return importanceDelta;
    return (orbitaleDateValue(right.timestamp)?.getTime() || 0) - (orbitaleDateValue(left.timestamp)?.getTime() || 0);
  }).slice(0, 10);

  target.innerHTML = `
    <div style="font-size:9px; font-weight:900; letter-spacing:1px; color:#99f6e4; margin-bottom:8px; text-transform:uppercase;">NUCLEO ATTIVO</div>
    ${topNodes.map((node, index) => orbitaleNodeCard(node, { title: `#${index + 1}`, textLimit: 150, tagLimit: 5 })).join("")}
  `;
}

function orbitaleTimelineGroup(timestamp) {
  const date = orbitaleDateValue(timestamp);
  if (!date) return "Più vecchie";
  const startToday = new Date();
  startToday.setHours(0, 0, 0, 0);
  const startTarget = new Date(date);
  startTarget.setHours(0, 0, 0, 0);
  const days = Math.floor((startToday - startTarget) / 86400000);
  if (days === 0) return "Oggi";
  if (days === 1) return "Ieri";
  if (days >= 2 && days <= 7) return "Ultimi 7 giorni";
  if (days >= 8 && days <= 30) return "Ultimi 30 giorni";
  return "Più vecchie";
}

function renderTemporalTimelineCard(target, nodes) {
  if (!target) return;
  if (!nodes.length) {
    target.innerHTML = orbitaleEmptyMessage();
    return;
  }

  const groups = ["Oggi", "Ieri", "Ultimi 7 giorni", "Ultimi 30 giorni", "Più vecchie"];
  const byGroup = Object.fromEntries(groups.map(group => [group, []]));
  nodes.slice().sort((left, right) => {
    const rightTime = orbitaleDateValue(right.lastAccess || right.timestamp)?.getTime() || 0;
    const leftTime = orbitaleDateValue(left.lastAccess || left.timestamp)?.getTime() || 0;
    return rightTime - leftTime;
  }).forEach(node => {
    const time = node.lastAccess || node.timestamp;
    byGroup[orbitaleTimelineGroup(time)].push(node);
  });

  target.innerHTML = groups.map(group => {
    const items = byGroup[group].slice(0, 10);
    return `
      <div style="margin-bottom:12px;">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:10px; font-size:9px; font-weight:900; letter-spacing:1px; color:#99f6e4; margin-bottom:6px; text-transform:uppercase;">
          <span>${orbitaleEscapeHtml(group)}</span>
          <span style="opacity:0.55;">${byGroup[group].length}</span>
        </div>
        ${items.length ? items.map(node => orbitaleNodeCard(node, {
          textLimit: 120,
          tagLimit: 3,
          time: orbitaleFormatTimestamp(node.lastAccess || node.timestamp)
        })).join("") : "<div style='opacity:0.42; font-size:10px; margin-bottom:8px;'>Nessuna memoria in questo gruppo.</div>"}
      </div>
    `;
  }).join("");
}

const ORBITALE_MCO_WEAK_TAGS = new Set([
  "user", "assistant", "temporary", "general", "emotion", "routine",
  "tone_positive", "tone_negative", "tone_uncertain", "tone_urgent"
]);

function orbitaleMcoClamp(value) {
  return Math.max(0, Math.min(1, value));
}

function orbitaleMcoTagList(node) {
  return orbitaleTags(node?.tags, 100)
    .map(tag => String(tag).trim().toLowerCase())
    .filter(Boolean);
}

function orbitaleMcoDomain(node) {
  const tags = orbitaleMcoTagList(node);
  const scores = new Map(Object.keys(ORBITALE_MCO_DOMAINS).map(domain => [domain, 0]));
  const reasons = new Map(Object.keys(ORBITALE_MCO_DOMAINS).map(domain => [domain, []]));

  Object.entries(ORBITALE_MCO_DOMAINS).forEach(([domain, config]) => {
    config.tags.forEach(strongTag => {
      tags.forEach(tag => {
        if (tag === strongTag) {
          scores.set(domain, scores.get(domain) + 3);
          reasons.get(domain).push(tag);
        } else if (tag.startsWith(strongTag + "_") || tag.includes(strongTag)) {
          scores.set(domain, scores.get(domain) + 1);
          reasons.get(domain).push(tag);
        }
      });
    });
  });

  const hasClinicalAnchor = tags.some(tag => ["entity_marco", "entity_angelman", "entity_aso", "entity_aso_paterno"].includes(tag));
  if (tags.includes("health")) {
    scores.set("Health", scores.get("Health") + 5);
    reasons.get("Health").push("health");
  }
  if (tags.some(tag => tag === "research" || tag === "pubmed")) {
    scores.set("Research", scores.get("Research") + 5);
    reasons.get("Research").push(tags.includes("pubmed") ? "pubmed" : "research");
  }
  if (tags.includes("learning") && !hasClinicalAnchor) {
    scores.set("Research", scores.get("Research") + 6);
    reasons.get("Research").push("learning");
  }
  if (tags.some(tag => tag === "memory" || tag === "orbital" || tag === "orbitale")) {
    scores.set("Memory/Architecture", scores.get("Memory/Architecture") + 5);
    reasons.get("Memory/Architecture").push("memory/orbitale");
  }

  const ranked = [...scores.entries()]
    .filter(([domain]) => domain !== "General")
    .sort((left, right) => right[1] - left[1]);
  if (ranked[0]?.[1] > 0) {
    const domain = ranked[0][0];
    return {
      domain,
      reason: "Tag: " + [...new Set(reasons.get(domain))].slice(0, 3).join(", ")
    };
  }

  const text = String(node?.text || node?.content?.text || node?.label || "").toLowerCase();
  const textRules = [
    ["Health", ["marco", "angelman", "aso", "trial", "rupatidina", "paf", "stress ossidativo"]],
    ["Research", ["pubmed", "studio", "ricerca", "evidenza", "letteratura"]],
    ["Memory/Architecture", ["memoria orbitale", "card", "nodo", "link", "grafo", "engine", "adapter", "cockpit", "mco"]],
    ["Family/Personal", ["elena", "moglie", "famiglia"]]
  ];
  for (const [domain, keywords] of textRules) {
    const keyword = keywords.find(item => text.includes(item));
    if (keyword) return { domain, reason: 'Testo: "' + keyword + '"' };
  }

  return {
    domain: "General",
    reason: tags.length ? "Solo tag generici o deboli" : "Nessun segnale semantico disponibile"
  };
}

function orbitaleMcoAnalyze(nodes, links) {
  const validNodes = Array.isArray(nodes) ? nodes.filter(node => node && node.id) : [];
  const nodesById = new Map(validNodes.map(node => [node.id, node]));
  const domainAnalysisById = new Map(validNodes.map(node => [node.id, orbitaleMcoDomain(node)]));
  const domainsById = new Map(validNodes.map(node => [node.id, domainAnalysisById.get(node.id)?.domain || "General"]));
  const validLinks = (Array.isArray(links) ? links : []).filter(link =>
    link && nodesById.has(link.source) && nodesById.has(link.target)
  );
  const linksByNode = new Map(validNodes.map(node => [node.id, []]));

  validLinks.forEach(link => {
    linksByNode.get(link.source).push(link);
    linksByNode.get(link.target).push(link);
  });

  const analyzedNodes = validNodes.map(node => {
    const domain = domainsById.get(node.id) || "General";
    const tags = orbitaleMcoTagList(node);
    const domainTags = ORBITALE_MCO_DOMAINS[domain]?.tags || [];
    const strongTags = tags.filter(tag => domainTags.some(strongTag =>
      tag === strongTag || tag.startsWith(strongTag + "_") || tag.includes(strongTag)
    ));
    const weakTags = tags.filter(tag =>
      ORBITALE_MCO_WEAK_TAGS.has(tag) ||
      (tag.startsWith("entity_") && !["entity_marco", "entity_elena", "entity_angelman", "entity_aso_paterno"].includes(tag))
    );
    const nodeLinks = linksByNode.get(node.id) || [];
    const coherentLinks = nodeLinks.filter(link => {
      const otherId = link.source === node.id ? link.target : link.source;
      return domainsById.get(otherId) === domain;
    });
    const heterogeneousLinks = nodeLinks.length - coherentLinks.length;
    const activation = orbitaleMcoClamp(orbitaleNumber(node.activation, 0));
    const importance = orbitaleMcoClamp(orbitaleNodeImportance(node));

    let centerScore = 0.18;
    centerScore += Math.min(0.28, strongTags.length * 0.09);
    centerScore += ((activation + importance) / 2) * 0.22;
    centerScore += nodeLinks.length ? Math.min(0.18, nodeLinks.length * 0.04) : -0.12;
    centerScore += nodeLinks.length ? (coherentLinks.length / nodeLinks.length) * 0.18 : 0;
    centerScore -= Math.min(0.18, weakTags.length * 0.025);
    centerScore -= nodeLinks.length ? (heterogeneousLinks / nodeLinks.length) * 0.16 : 0;
    if (!tags.length) centerScore -= 0.15;
    if (domain === "General") centerScore -= 0.12;
    centerScore = orbitaleMcoClamp(centerScore);

    let noiseScore = 1 - centerScore;
    noiseScore += Math.min(0.12, weakTags.length * 0.015);
    if (!node.timestamp && !node.lastAccess) noiseScore += 0.08;
    if (!nodeLinks.length) noiseScore += 0.10;
    if (nodeLinks.length) noiseScore += (heterogeneousLinks / nodeLinks.length) * 0.10;
    noiseScore = orbitaleMcoClamp(noiseScore);

    const weakLinks = nodeLinks.filter(link => {
      const otherId = link.source === node.id ? link.target : link.source;
      const otherTags = orbitaleMcoTagList(nodesById.get(otherId));
      const otherWeakTags = otherTags.filter(tag => ORBITALE_MCO_WEAK_TAGS.has(tag) || tag.startsWith("entity_"));
      return orbitaleNumber(link.weight, 0) < 0.5 ||
        domainsById.get(otherId) !== domain ||
        !otherTags.length ||
        otherWeakTags.length > Math.max(2, otherTags.length / 2);
    }).map(link => {
      const otherId = link.source === node.id ? link.target : link.source;
      return {
        ...link,
        otherId,
        otherLabel: orbitaleMemoryText(nodesById.get(otherId), 52) || orbitaleShortId(otherId),
        otherDomain: domainsById.get(otherId) || "General"
      };
    });

    return {
      ...node,
      domain,
      domainReason: domainAnalysisById.get(node.id)?.reason || "Nessun segnale semantico disponibile",
      centerScore,
      noiseScore,
      linkCount: nodeLinks.length,
      weakLinks,
      missingVariables: ORBITALE_MCO_DOMAINS[domain]?.missingVariables || ORBITALE_MCO_DOMAINS.General.missingVariables,
      bestQuestions: ORBITALE_MCO_DOMAINS[domain]?.bestQuestions || ORBITALE_MCO_DOMAINS.General.bestQuestions
    };
  });

  const average = key => analyzedNodes.length
    ? analyzedNodes.reduce((sum, node) => sum + node[key], 0) / analyzedNodes.length
    : 0;
  const domainCounts = analyzedNodes.reduce((counts, node) => {
    counts[node.domain] = (counts[node.domain] || 0) + 1;
    return counts;
  }, {});
  const dominantDomain = Object.entries(domainCounts)
    .sort((left, right) => right[1] - left[1] || left[0].localeCompare(right[0]))[0]?.[0] || "-";
  const weakLinkIds = new Set();
  analyzedNodes.forEach(node => node.weakLinks.forEach(link => weakLinkIds.add(link.id || (link.source + "|" + link.target))));

  return {
    nodes: analyzedNodes,
    validLinks,
    averageCenter: average("centerScore"),
    averageNoise: average("noiseScore"),
    dominantDomain,
    weakLinksCount: weakLinkIds.size
  };
}

function orbitaleMcoSignal(centerScore) {
  if (centerScore >= 0.75) return { color: "#22c55e", label: "domain ben centrato" };
  if (centerScore >= 0.45) return { color: "#facc15", label: "rumore medio" };
  return { color: "#ef4444", label: "rumore alto" };
}

function orbitaleMcoIsShortGreeting(node) {
  const text = String(node?.text || node?.label || "").replace(/[!?.,;:]+/g, " ").replace(/\s+/g, " ").trim().toLowerCase();
  if (!text || text.length > 45) return false;
  return /^(ciao|buonasera|buongiorno|ola|salve|come stai)(\b|$)/i.test(text);
}

function orbitaleMcoSearchText(node) {
  return [
    node?.text,
    node?.label,
    orbitaleMcoTagList(node).join(" "),
    node?.domain,
    orbitaleNodeRole(node)
  ].filter(Boolean).join(" ").toLowerCase();
}

function renderOrbitaleMcoCard(target, nodes, links) {
  if (!target) return;
  const analysis = orbitaleMcoAnalyze(nodes, links);
  if (!analysis.nodes.length) {
    target.innerHTML = orbitaleEmptyMessage();
    return;
  }

  const relevantNoise = analysis.nodes.filter(node =>
    orbitaleNodeImportance(node) >= 0.3 &&
    orbitaleNodeDepth(node) !== "temporary" &&
    !orbitaleMcoIsShortGreeting(node) &&
    !(node.linkCount === 0 && node.domain === "General")
  ).sort((left, right) => right.noiseScore - left.noiseScore || left.centerScore - right.centerScore)
    .slice(0, 10);
  const highCenter = analysis.nodes.slice()
    .sort((left, right) => right.centerScore - left.centerScore || left.noiseScore - right.noiseScore)
    .slice(0, 10);
  const view = ["noise", "center", "all"].includes(target.dataset.orbitaleMcoView)
    ? target.dataset.orbitaleMcoView

    if (nextInput) {
      nextInput.focus();
      nextInput.setSelectionRange(nextInput.value.length, nextInput.value.length);
    }
  });
}

async function loadOrbitaleMemoryCard(cardId) {
  const statusBox = document.getElementById(`orbitale-status-${cardId}`);
  const barsBox = document.getElementById(`orbitale-bars-${cardId}`);
  const nodesBox = document.getElementById(`orbitale-nodes-${cardId}`);
  const linksBox = document.getElementById(`orbitale-links-${cardId}`);
  const graphBox = document.getElementById(`orbitale-graph-${cardId}`);
  const coreBox = document.getElementById(`orbitale-core-${cardId}`);
  const timelineBox = document.getElementById(`orbitale-timeline-${cardId}`);
  const mcoBox = document.getElementById(`orbitale-mco-${cardId}`);
  if (!statusBox || !barsBox || !nodesBox || !linksBox || !graphBox || !coreBox || !timelineBox || !mcoBox) return;

  statusBox.innerHTML = orbitaleMetricBox("Memorie", "...") + orbitaleMetricBox("Link", "...");
  nodesBox.innerHTML = "<div style='opacity:0.55; font-size:11px;'>Loading...</div>";
  linksBox.innerHTML = "<div style='opacity:0.55; font-size:11px;'>Loading...</div>";
  graphBox.innerHTML = "<div style='opacity:0.55; font-size:11px;'>Loading...</div>";
  coreBox.innerHTML = "<div style='opacity:0.55; font-size:11px;'>Loading...</div>";
  timelineBox.innerHTML = "<div style='opacity:0.55; font-size:11px;'>Loading...</div>";
  mcoBox.innerHTML = "<div style='opacity:0.55; font-size:11px;'>Loading...</div>";

  try {
    const [statusRes, graphRes] = await Promise.all([
      fetch("/api/orbitale/status", { credentials: "include" }),
      fetch("/api/orbitale/graph", { credentials: "include" })
    ]);

    if (!statusRes.ok || !graphRes.ok) {
      throw new Error(`Orbitale request failed status=${statusRes.status} graph=${graphRes.status}`);
    }

    const status = await statusRes.json();
    const graph = await graphRes.json();
    const nodes = Array.isArray(graph.nodes) ? graph.nodes : [];
    const links = Array.isArray(graph.links) ? graph.links : [];

    statusBox.innerHTML = [
      orbitaleMetricBox("Memorie", status.memoriesCount || nodes.length || 0),
      orbitaleMetricBox("Link", status.linksCount || links.length || 0),
      orbitaleMetricBox("Enabled", status.enabled ? "true" : "false"),
      orbitaleMetricBox("Tags", Array.isArray(status.topTags) ? status.topTags.length : 0)
    ].join("");

    barsBox.innerHTML = [
      orbitaleDistribution("Role", status.roles),
      orbitaleDistribution("Orbite", status.orbits),
      orbitaleDistribution("Depth", status.depths)
    ].join("");

    if (!nodes.length) {
      nodesBox.innerHTML = orbitaleEmptyMessage();
      linksBox.innerHTML = "<div style='opacity:0.55; font-size:11px;'>No links.</div>";
      renderOrbitGraphCard(graphBox, nodes, links);
      renderActiveCoreCard(coreBox, nodes);
      renderTemporalTimelineCard(timelineBox, nodes);
      renderOrbitaleMcoCard(mcoBox, nodes, links);
      return;
    }

    const latestNodes = nodes
      .slice()
      .sort((left, right) => (orbitaleDateValue(right.timestamp)?.getTime() || 0) - (orbitaleDateValue(left.timestamp)?.getTime() || 0))
      .slice(0, 10);

    nodesBox.innerHTML = latestNodes.map(node => orbitaleNodeCard(node, {
      textLimit: 115,
      tagLimit: 3,
      time: orbitaleFormatTimestamp(node.timestamp)
    })).join("");

    linksBox.innerHTML = links.slice(0, 10).map(link => `
      <div style="border:1px solid rgba(255,255,255,0.10); background:rgba(255,255,255,0.04); border-radius:8px; padding:8px; margin-bottom:7px; font-size:10px; line-height:1.35;">
        <div style="color:#ccfbf1; font-weight:900; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${orbitaleEscapeHtml(link.type || "unknown")} | w ${orbitaleEscapeHtml(orbitaleFormatScore(link.weight))}</div>
        <div style="opacity:0.65; margin-top:4px; word-break:break-all;">${orbitaleEscapeHtml(orbitaleShortId(link.source))} -> ${orbitaleEscapeHtml(orbitaleShortId(link.target))}</div>
      </div>
    `).join("") || "<div style='opacity:0.55; font-size:11px;'>No links.</div>";

    renderOrbitGraphCard(graphBox, nodes, links);
    renderActiveCoreCard(coreBox, nodes);
    renderTemporalTimelineCard(timelineBox, nodes);
    renderOrbitaleMcoCard(mcoBox, nodes, links);
  } catch (err) {
    statusBox.innerHTML = orbitaleMetricBox("Status", "error");
    barsBox.innerHTML = "";
    nodesBox.innerHTML = "<div style='opacity:0.65; font-size:11px;'>Orbitale cockpit unavailable.</div>";
    linksBox.innerHTML = "";
    graphBox.innerHTML = "<div style='opacity:0.65; font-size:11px;'>Orbitale cockpit unavailable.</div>";
    coreBox.innerHTML = "";
    timelineBox.innerHTML = "";
    mcoBox.innerHTML = "";
    console.error("Orbitale cockpit error", err);
  }
}

// Navigazione Mesi
function changeMonth(cardId, delta) {
  const card = document.getElementById(cardId);
  let m = parseInt(card.dataset.month) + delta;
  let y = parseInt(card.dataset.year);
  if (m > 11) { m = 0; y++; }
  if (m < 0) { m = 11; y--; }
  card.dataset.month = m;
  card.dataset.year = y;
  renderCalendar(cardId);
}

// Rendering della Griglia
async function renderCalendar(cardId) {
  const card = document.getElementById(cardId);
  const m = parseInt(card.dataset.month);
  const y = parseInt(card.dataset.year);
  const grid = document.getElementById(`cal-grid-${cardId}`);
  const title = document.getElementById(`cal-month-title-${cardId}`);
  
  const monthNames = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
  title.innerText = `${monthNames[m]} ${y}`;

  // Recupera eventi dal server per evidenziare i giorni
  const res = await fetch("/api/reminders", { credentials: "include" });
  const data = await res.json();
  const reminders = data.reminders || [];

  grid.innerHTML = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].map(d => `<div class="cal-day-name">${d}</div>`).join('');

  const firstDay = new Date(y, m, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const daysInMonth = new Date(y, m + 1, 0).getDate();

  // Giorni vuoti mese precedente
  for(let i=0; i<offset; i++) grid.innerHTML += `<div class="cal-day other-month"></div>`;

  // Giorni del mese
  const today = new Date();
  for(let d=1; d<=daysInMonth; d++) {
    const isToday = today.getDate() === d && today.getMonth() === m && today.getFullYear() === y;
    
    // Controlla se ci sono eventi in questo giorno
    const hasEvent = reminders.some(r => {
      const dAt = new Date(r.dueAt);
      return dAt.getDate() === d && dAt.getMonth() === m && dAt.getFullYear() === y;
    });

    grid.innerHTML += `
      <div class="cal-day ${isToday?'today':''} ${hasEvent?'has-event':''}" 
           onclick="showEventsForDay('${cardId}', ${d}, ${m}, ${y})">
        ${d}
      </div>`;
  }
}

/* --- FIX MINIMIZZA NEL DOCK (DEFINITIVO) --- */
function toggleMinimize(btn) {
  const card = btn.closest('.card');
  const dock = document.getElementById('dock');
  const cardId = card.id;
  
  // Cerca il titolo. Se non c'è il titolo standard, usa un nome generico o quello del Nexus
  let cardTitle = "APP";
  const titleEl = card.querySelector('.card-title');
  if (titleEl) {
      cardTitle = titleEl.innerText;
  } else if (card.classList.contains('chat')) {
      cardTitle = "NEXUS CORE";
  } else if (card.classList.contains('reader')) {
      cardTitle = "READER";
  }

  // 1. Nascondi la card con animazione CSS
  card.classList.add('minimized-to-dock');

  // 2. Crea l'elemento nel Dock
  const dockItem = document.createElement('div');
  dockItem.className = 'dock-item';
  dockItem.id = `dock-item-${cardId}`;
  
  // Colore icona in base al tipo di card
  let iconColor = "#fff";
  if (card.classList.contains('intelligence')) iconColor = "#0ea5e9"; // Ciano
  if (card.classList.contains('core')) iconColor = "#22d3ee";         // Verde acqua
  if (card.classList.contains('event')) iconColor = "#a855f7";        // Viola
  if (card.classList.contains('news')) iconColor = "#3b82f6";         // Blu
  if (card.classList.contains('chat')) iconColor = "#6366f1";         // Indaco (Nexus)
  if (card.classList.contains('reader')) iconColor = "#f472b6";       // Rosa

  dockItem.innerHTML = `<span style="color:${iconColor}; font-size:14px;">●</span> ${cardTitle}`;
  
  // 3. Click sul dock item per ripristinare
  dockItem.onclick = () => {
    card.classList.remove('minimized-to-dock');
    dockItem.remove();
    if (dock.children.length === 0) dock.classList.remove('active');
  };

  dock.appendChild(dockItem);
  dock.classList.add('active'); // Mostra il dock
}

/* --- LOGICA RSS FEEDER --- */// --- CARICAMENTO FEED (CON FILTRO SCADENZA) ---
async function loadAllFeeds(cardId, topics) {
  const listContainer = document.getElementById(`rss-feed-${cardId}`);
  if (!listContainer) return;

  let allNews = [];
  
  // --- IMPOSTA IL LIMITE DI ETÀ DELLE NOTIZIE ---
  const MAX_DAYS_OLD = 7; // Scarta le notizie più vecchie di 7 giorni
  const maxAgeMs = MAX_DAYS_OLD * 24 * 60 * 60 * 1000;
  const now = Date.now();

  const shuffled = topics.sort(() => 0.5 - Math.random()).slice(0, 3);

  for (const topic of shuffled) {
    try {
      const res = await fetch("/api/fetch-rss", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ topic })
      });
      
      const xmlText = await res.text();
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xmlText, "text/xml");
      const items = xmlDoc.querySelectorAll("item");

      let addedForThisTopic = 0;

      items.forEach((item) => {
        if (addedForThisTopic >= 10) return; // Max 10 notizie RECENTI per topic

        // Estrai la data della notizia
        const pubDateStr = item.querySelector("pubDate") ? item.querySelector("pubDate").textContent : null;
        const articleDate = new Date(pubDateStr || now).getTime();

        // FILTRO: È più vecchia di 7 giorni?
        if ((now - articleDate) < maxAgeMs) {
          allNews.push({
            title: item.querySelector("title").textContent,
            link: item.querySelector("link").textContent,
            date: new Date(articleDate),
            source: topic
          });
          addedForThisTopic++; // Contiamo solo se l'abbiamo effettivamente aggiunta
        }
      });

    } catch (e) { 
      console.log("RSS Fail for", topic); 
    }
  }

  // Ordina tutto dal più recente al più vecchio
  allNews.sort((a, b) => b.date - a.date);

  // Se dopo il filtro non è rimasto nulla di recente:
  if (allNews.length === 0) {
    listContainer.innerHTML = `
      <div style="text-align:center; padding:30px; opacity:0.5;">
        <div style="font-size:24px; margin-bottom:10px;">⏳</div>
        <div>Nessuna notizia recente (ultimi ${MAX_DAYS_OLD} giorni).</div>
      </div>`;
    return;
  }

  // Altrimenti, renderizza la lista pulita
  renderRssList(cardId, allNews);
}
