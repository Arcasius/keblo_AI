<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Keblo – Dashboard AI</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <div id="dock"></div>
  <style>
   /* ============================================================
   KEBLO UI — CLEAN CSS (A: draggable absolute cards)
   - Tokens -> Components -> Card Variants -> Stations
   ============================================================ */

/* ---------------------------
   0) TOKENS / BASE
---------------------------- */
:root{
  /* motion */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  --t-fast: 140ms;
  --t-med: 220ms;
  --t-slow: 420ms;

  /* layers */
  --z-cards: 100;
  --z-dock: 10000;
  --z-overlay: 9999;

  /* radius */
  --r-1: 10px;
  --r-2: 14px;
  --r-3: 22px;

  /* spacing */
  --s-1: 6px;
  --s-2: 10px;
  --s-3: 14px;
  --s-4: 18px;
  --s-5: 24px;

  /* typography */
  --font-ui: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

  /* colors (base) */
  --bg-0: #0b1020;
  --bg-1: rgba(255,255,255,0.07);
  --bg-2: rgba(0,0,0,0.25);
  --border: rgba(255,255,255,0.18);
  --text: rgba(255,255,255,0.92);
  --muted: rgba(255,255,255,0.55);

  /* glass */
  --glass-blur: 18px;
  --shadow-soft: 0 25px 55px rgba(0,0,0,0.42);
  --shadow-hard: 0 35px 85px rgba(0,0,0,0.55);

  /* focus ring */
  --focus-ring: 0 0 0 4px rgba(34, 211, 238, 0.18);

  /* accents per card type */
  --a-chat: #6366f1;
  --a-memo: #22d3ee;
  --a-rss: #0ea5e9;
  --a-core: #38bdf8;
  --a-event: #a855f7;
  --a-intel: #00ffcc;
  --a-search: #8b5cf6;
  --a-upload: #3b82f6;
  --a-news: #ef4444;
  --a-reader: #38bdf8;
  --a-journal: #d946ef;
  --a-vision: #f472b6;
}

/* grain overlay */
body::before{
  content:"";
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.06'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:-1;
  mix-blend-mode: overlay;
}

html, body{
  height:100%;
}

body{
  margin:0;
  font-family: var(--font-ui);
  color: var(--text);
  overflow:hidden;
  background:
    radial-gradient(1000px 700px at 10% 10%, rgba(99,102,241,0.18), transparent 55%),
    radial-gradient(900px 650px at 90% 30%, rgba(34,211,238,0.14), transparent 55%),
    radial-gradient(1100px 800px at 50% 100%, rgba(168,85,247,0.12), transparent 60%),
    radial-gradient(ellipse at 0% 0%, #334155 0%, #0b1020 55%, #070a12 100%);
}

/* scrollbars */
::-webkit-scrollbar{ width:6px; height:6px; }
::-webkit-scrollbar-track{ background: rgba(0,0,0,0.12); }
::-webkit-scrollbar-thumb{ background: rgba(255,255,255,0.22); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover{ background: rgba(255,255,255,0.38); }

/* ---------------------------
   1) LOGIN OVERLAY
---------------------------- */
#login-overlay{
  position: fixed;
  inset: 0;
  z-index: var(--z-overlay);
  display:flex;
  align-items:center;
  justify-content:center;
  background: radial-gradient(circle at top, #1e293b, #020617);
  backdrop-filter: blur(18px);
  transition: opacity var(--t-slow) var(--ease-out);
}

.login-box{
  width: 320px;
  padding: 40px;
  text-align:center;
  border-radius: 24px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 25px 55px rgba(0,0,0,0.55);
}

.login-box input{
  width:100%;
  box-sizing:border-box;
  margin-bottom: 14px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(0,0,0,0.28);
  color: white;
  outline:none;
}
.login-box input:focus{
  border-color: rgba(59,130,246,0.55);
  box-shadow: 0 0 0 4px rgba(59,130,246,0.15);
}
.login-box button{
  width:100%;
  padding: 12px;
  border-radius: 12px;
  border:none;
  cursor:pointer;
  font-weight: 900;
  background: #3b82f6;
  color: white;
}

/* ---------------------------
   2) SYSTEM CLOCK
---------------------------- */
#system-clock{
  position: fixed;
  top: 26px;
  right: 34px;
  text-align:right;
  z-index: 0;
  pointer-events:none;
  text-shadow: 0 2px 12px rgba(0,0,0,0.35);
}
#clock-time{
  font-size: 46px;
  font-weight: 220;
  letter-spacing: -2px;
  line-height: 1;
  color: rgba(255,255,255,0.92);
}
#clock-date{
  margin-top: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.55);
}

/* ---------------------------
   3) DOCK
---------------------------- */
#dock{
  position: fixed;
  left: 50%;
  bottom: 20px;
  transform: translateX(-50%);
  z-index: var(--z-dock);

  display:flex;
  gap: 10px;
  padding: 10px 14px;

  border-radius: 18px;
  background: rgba(15,23,42,0.55);
  border: 1px solid rgba(255,255,255,0.12);
  backdrop-filter: blur(18px) saturate(160%);
  box-shadow: 0 18px 40px rgba(0,0,0,0.45);

  opacity: 0;
  pointer-events: none;
  transition: all var(--t-slow) var(--ease-out);
}
#dock.active{
  opacity: 1;
  pointer-events:auto;
  bottom: 28px;
}
.dock-item{
  padding: 8px 14px;
  border-radius: 14px;
  cursor:pointer;
  user-select:none;

  font-size: 10px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;

  color: rgba(255,255,255,0.92);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);

  display:flex;
  align-items:center;
  gap: 8px;

  transition: transform var(--t-fast) var(--ease-out),
              background var(--t-fast) var(--ease-out),
              border-color var(--t-fast) var(--ease-out);
}
.dock-item:hover{
  transform: translateY(-2px);
  background: rgba(255,255,255,0.10);
  border-color: rgba(34,211,238,0.35);
}

/* ---------------------------
   4) CARD BASE (draggable absolute)
---------------------------- */
.card{
  position: absolute;
  width: 340px;
  height: 300px;
  min-width: 250px;
  min-height: 150px;

  z-index: var(--z-cards);
  cursor: move;
  resize: both;
  overflow: hidden;
  background: none !important;
  border: none !important;
  box-shadow: none !important;

  perspective: 1000px;
  transform: translateZ(0);
}

/* state helpers */
.card.minimized-to-dock{
  transform: translateY(100vh) scale(0) !important;
  opacity: 0 !important;
  pointer-events:none !important;
  visibility:hidden !important;
  transition: all var(--t-slow) var(--ease-out) !important;
}

.card.is-dragging *{
  transition: none !important; /* zero lag mentre trascini */
}

/* flip system */
.card-inner{
  position: relative;
  width:100%;
  height:100%;
  transform-style: preserve-3d;
  transition: transform 600ms var(--ease-smooth);
}
.card.flipped .card-inner{ transform: rotateY(180deg); }

.card-front, .card-back{
  position:absolute;
  inset:0;

  display:flex;
  flex-direction: column;

  border-radius: var(--r-3);
  padding: 14px;
  box-sizing:border-box;

  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;

  overflow:hidden;

  /* glass default */
  background: var(--bg-1);
  backdrop-filter: blur(var(--glass-blur)) saturate(160%);
  border: 1px solid var(--border);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.18),
    inset 0 -1px 0 rgba(0,0,0,0.32),
    var(--shadow-soft),
    0 0 30px rgba(120,119,198,0.18);
}

.card-back{
  transform: rotateY(180deg);
  background: rgba(15,23,42,0.92);
}

/* texture overlay for both */
.card-front::after, .card-back::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  border-radius: inherit;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(255,255,255,0.06), transparent 70%);
  mix-blend-mode: overlay;
  opacity: 1;
}

/* common typography inside */
.card-front, .card-back,
.card-front *, .card-back *{
  color: rgba(255,255,255,0.90);
}
/* Applica il colore agli elementi interni solo se non hanno un colore proprio */
.card-front :not([style*="color"]), .card-back :not([style*="color"]) {
  color: inherit;
}

.card-title{
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.95;
  padding-right: 72px; /* spazio per bottoni */
  margin-bottom: 10px;
  position: relative;
  z-index: 2;
}

/* control buttons (minimize / flip) */
.minimize-card, .flip-btn{
  position:absolute;
  top: 12px;
  z-index: 110;
  width: 28px;
  height: 28px;
  border-radius: 10px;

  display:flex;
  align-items:center;
  justify-content:center;

  cursor:pointer;
  user-select:none;
  background: rgba(0,0,0,0.26);
  border: 1px solid rgba(255,255,255,0.12);

  transition: transform var(--t-fast) var(--ease-out),
              background var(--t-fast) var(--ease-out);
}
.minimize-card{ right: 12px; }
.flip-btn{ right: 46px; font-size: 12px; }

.minimize-card:hover, .flip-btn:hover{
  background: rgba(255,255,255,0.10);
  transform: translateY(-1px);
}

/* hide close button if exists */
.close-card{ display:none !important; }

/* content area */
.card-content{
  position: relative;
  z-index: 2;
  flex: 1;
  min-height: 0;
  display:flex;
  flex-direction: column;
  gap: 10px;
  overflow:hidden;
}

/* hover polish */
.card:hover .card-front,
.card:hover .card-back{
  border-color: rgba(255,255,255,0.28);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.22),
    inset 0 -1px 0 rgba(0,0,0,0.36),
    var(--shadow-hard),
    0 0 42px rgba(120,119,198,0.22);
}

/* ---------------------------
   5) FORMS / BUTTONS
---------------------------- */
.card-q{
  width:100%;
  box-sizing:border-box;
  border-radius: var(--r-2);
  border: 1px solid rgba(255,255,255,0.14);
  background: rgba(0,0,0,0.22);
  color: var(--text);
  padding: 10px 12px;
  outline:none;
  transition: box-shadow var(--t-fast) var(--ease-out),
              border-color var(--t-fast) var(--ease-out),
              background var(--t-fast) var(--ease-out);
  font-size: 12px;
}
.card-q:focus{
  border-color: color-mix(in srgb, var(--accent, #22d3ee) 45%, rgba(255,255,255,0.18));
  box-shadow: var(--focus-ring);
  background: rgba(0,0,0,0.28);
}

.card-btn{
  width:100%;
  padding: 10px 12px;
  border-radius: var(--r-2);
  border:none;
  cursor:pointer;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-size: 10px;
  color: #0b1020;
  background: color-mix(in srgb, var(--accent, #60a5fa) 75%, white);
  transition: transform var(--t-fast) var(--ease-out),
              filter var(--t-fast) var(--ease-out);
}
.card-btn:hover{
  transform: translateY(-1px);
  filter: brightness(1.06);
}
.card-btn:active{
  transform: translateY(0) scale(0.99);
}

/* ---------------------------
   6) STREAM RESULT (one canonical)
---------------------------- */
.stream-result{
  flex: 1;
  min-height: 60px;
  overflow: auto;

  padding: 14px;
  border-radius: var(--r-2);

  background: rgba(0,0,0,0.26);
  border: 1px solid rgba(255,255,255,0.08);

  font-family: var(--font-ui);
  font-size: 0.88em;
  line-height: 1.45;
  white-space: normal;
  word-break: break-word;
}

/* nice HTML inside stream */
.stream-result h3{
  margin: 12px 0 6px 0;
  font-size: 1.08em;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding-bottom: 4px;
}
.stream-result p{ margin: 0 0 10px 0; }
.stream-result ul, .stream-result ol{ margin: 0 0 10px 18px; padding:0; }
.stream-result li{ margin-bottom: 4px; color: rgba(255,255,255,0.78); }
.stream-result b, .stream-result strong{
  color: color-mix(in srgb, var(--accent, #22d3ee) 80%, white);
  font-weight: 700;
}
.stream-result pre{
  background: rgba(0,0,0,0.34);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 10px;
  overflow:auto;
  font-family: var(--font-mono);
  font-size: 12px;
}

/* ---------------------------
   7) HISTORY LIST (retro logs)
---------------------------- */
.history-list{
  flex: 1;
  min-height: 0;
  overflow:auto;

  margin-top: 10px;
  padding: 10px;

  border-radius: var(--r-2);
  background: rgba(0,0,0,0.30);
  border: 1px solid rgba(255,255,255,0.06);

  font-family: var(--font-mono);
  font-size: 11px;
  color: rgba(148,163,184,0.95);
  line-height: 1.5;
}

.history-item{
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  word-wrap: break-word;
}
.history-item:last-child{
  border-bottom:none;
  margin-bottom:0;
  padding-bottom:0;
}

/* ---------------------------
   8) TOKEN INFO (tiny)
---------------------------- */
#tokenInfo{
  margin-top: 10px;
  font-size: 10px;
  opacity: 0.45;
  letter-spacing: 1px;
  text-transform: uppercase;
  text-align:center;
  width:100%;
  transition: opacity var(--t-med) var(--ease-out);
}
#tokenInfo:hover{ opacity: 0.85; }

/* ============================================================
   9) CARD VARIANTS (ACCENT + glow)
   (Only one place controls border/glow per station)
   ============================================================ */

.card.chat{ --accent: var(--a-chat); }
.card.memo{ --accent: var(--a-memo); }
.card.rss{ --accent: var(--a-rss); }
.card.core{ --accent: var(--a-core); }
.card.event{ --accent: var(--a-event); }
.card.intelligence{ --accent: var(--a-intel); }
.card.search{ --accent: var(--a-search); }
.card.file_upload{ --accent: var(--a-upload); }
.card.news{ --accent: var(--a-news); }
.card.reader{ --accent: var(--a-reader); }
.card.journal{ --accent: var(--a-journal); }
.card.vision{ --accent: var(--a-vision); }

/* apply accent to surfaces */
.card.chat .card-front, .card.chat .card-back,
.card.memo .card-front, .card.memo .card-back,
.card.rss .card-front, .card.rss .card-back,
.card.core .card-front, .card.core .card-back,
.card.event .card-front, .card.event .card-back,
.card.intelligence .card-front, .card.intelligence .card-back,
.card.search .card-front, .card.search .card-back,
.card.file_upload .card-front, .card.file_upload .card-back,
.card.news .card-front, .card.news .card-back,
.card.reader .card-front, .card.reader .card-back,
.card.journal .card-front, .card.journal .card-back,
.card.vision .card-front, .card.vision .card-back{
  border-color: color-mix(in srgb, var(--accent) 55%, rgba(255,255,255,0.16));
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.18),
    inset 0 -1px 0 rgba(0,0,0,0.32),
    var(--shadow-soft),
    0 0 34px color-mix(in srgb, var(--accent) 28%, transparent);
}

/* title tint */
.card.chat .card-title,
.card.memo .card-title,
.card.rss .card-title,
.card.core .card-title,
.card.event .card-title,
.card.intelligence .card-title,
.card.search .card-title,
.card.file_upload .card-title,
.card.news .card-title,
.card.reader .card-title,
.card.journal .card-title,
.card.vision .card-title{
  color: color-mix(in srgb, var(--accent) 78%, rgba(255,255,255,0.92));
  text-shadow: 0 0 10px color-mix(in srgb, var(--accent) 30%, transparent);
}

/* ============================================================
   10) STATIONS (specific internal layouts)
   ============================================================ */
/* ============================================================
   10.001 EVENT STATION (KEBLO HUD VERSION)
   ============================================================ */

/* Contenitore Split */
.agenda-split {
  display: flex;
  gap: 20px;
  height: 100%;
  padding: 5px;
}

/* Colonna Calendario (Sinistra) */
.calendar-section {
  width: 215px; 
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
}

/* Griglia Calendario */
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  padding: 10px;
  background: rgba(0, 0, 0, 0.25);
  border-radius: var(--r-2);
  border: 1px solid rgba(255,255,255,0.05);
}

.cal-day-name {
  font-size: 8px;
  opacity: 0.4;
  text-align: center;
  font-weight: 900;
  text-transform: uppercase;
  padding-bottom: 5px;
}

.cal-day {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-family: var(--font-mono); /* Look tecnico */
  border-radius: 6px;
  cursor: pointer;
  transition: all var(--t-fast) var(--ease-out);
  background: rgba(255, 255, 255, 0.02);
  border: 1px solid transparent;
}

.cal-day:hover {
  background: rgba(168, 85, 247, 0.2);
  border-color: rgba(168, 85, 247, 0.3);
}

/* Giorno selezionato (Quello che clicchi) */
.cal-day.selected {
  background: rgba(168, 85, 247, 0.3) !important;
  border: 1px solid #a855f7 !important;
  color: #fff;
  box-shadow: 0 0 12px rgba(168, 85, 247, 0.4);
}

/* Giorno con impegni (Puntino sotto) */
.cal-day.has-event {
  position: relative;
  color: #a855f7;
  font-weight: 900;
}
.cal-day.has-event::after {
  content: '';
  position: absolute;
  bottom: 3px;
  width: 3px;
  height: 3px;
  background: #a855f7;
  border-radius: 50%;
  box-shadow: 0 0 5px #a855f7;
}

.cal-day.today {
  background: var(--a-event);
  color: white;
  font-weight: bold;
  box-shadow: 0 0 15px color-mix(in srgb, var(--a-event) 50%, transparent);
}

/* Colonna Timeline (Destra) */
.timeline-section {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: rgba(0, 0, 0, 0.3);
  border-radius: var(--r-3);
  padding: 15px;
  min-width: 0;
  border: 1px solid rgba(168, 85, 247, 0.15);
  box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
}

/* Card degli impegni */
.event-card {
  background: linear-gradient(90deg, rgba(168, 85, 247, 0.08) 0%, rgba(255,255,255,0.02) 100%);
  border: 1px solid rgba(255,255,255,0.05);
  border-left: 3px solid #a855f7;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  transition: transform 0.2s ease;
}
.event-card:hover { transform: translateX(4px); background: rgba(168, 85, 247, 0.12); }

/* Header e Input */
.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 1px;
  margin-bottom: 10px;
}

.agenda-input-wrapper {
  display: flex;
  gap: 8px;
  background: rgba(0,0,0,0.4);
  padding: 6px;
  border-radius: 12px;
  border: 1px solid rgba(168, 85, 247, 0.2);
}
/* 10.1 CHAT STATION (nexus) */
.card.chat .card-content{
  padding: 0 !important;
}
#chat-input-container{
  flex-shrink: 0;
  padding: 14px;
  background: rgba(79,92,123,0.45);
  border-bottom: 1px solid rgba(99,102,241,0.26);
}
#nexus-display{
  flex: 1;
  min-height: 0;
  overflow:auto;
  padding: 14px;
  scroll-behavior: smooth;
  
  /* FIX: Permette la selezione del testo */
  user-select: text !important;
  -webkit-user-select: text !important;
  cursor: auto; 
}
#nexus-out-text{
  background: rgba(30,41,59,0.78);
  border: 1px solid rgba(99,102,241,0.26);
  border-radius: var(--r-2);
  padding: 14px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.30);
  margin-bottom: 10px;
  word-wrap: break-word;
  
  /* FIX: Forza la selezione anche qui */
  user-select: text !important;
  cursor: text;
}
#nexus-out-text pre{
  background: rgba(0,0,0,0.32);
  border-radius: 10px;
  padding: 10px;
  overflow:auto;
  /* Fondamentale per copiare il codice */
  user-select: text !important;
}

/* 10.2 MEMO STATION */

window.KebloVoice = {
    audio: new Audio(),
    isPlaying: false,

    async speak(text, btnElement = null) {
        if (this.isPlaying) {
            this.audio.pause();
            this.isPlaying = false;
            if (btnElement) btnElement.innerHTML = "🔊";
            return;
        }

        if (btnElement) btnElement.innerHTML = "🌀"; // Animazione caricamento

        try {
            const res = await fetch("/api/tts", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: text.substring(0, 1000) }) // Max 1000 caratteri per volta
            });
            const data = await res.json();

            if (data.ok) {
                this.audio.src = data.url;
                this.audio.play();
                this.isPlaying = true;
                if (btnElement) btnElement.innerHTML = "⏹️";

                this.audio.onended = () => {
                    this.isPlaying = false;
                    if (btnElement) btnElement.innerHTML = "🔊";
                };
            }
        } catch (e) {
            console.error("Errore Voce:", e);
            if (btnElement) btnElement.innerHTML = "⚠️";
        }
    }
};

    // --- FIX ANALISI FILE STREAM (MIGLIORATO) ---
async function runCardSearch(cardId) {
    // 1. Prendi tutti i checkbox selezionati
    const selectedChecks = document.querySelectorAll(`#sandboxList_${cardId} .file-check:checked`);
    const files = Array.from(selectedChecks).map(cb => cb.value);
    
    const q = document.getElementById(`q-${cardId}`).value;
    const resDiv = document.getElementById(`res-${cardId}`);
    
    // 2. Controllo sicurezza
    if (files.length === 0) return alert("Seleziona almeno un file per l'analisi.");
    if (!q) return alert("Inserisci una domanda.");
    
    logToCard(cardId, `Analisi multi-file avviata su ${files.length} documenti.`);
    resDiv.innerHTML = "<em>Keblo sta incrociando i dati dei file selezionati...</em>";
    
    try {
        const response = await fetch('/api/card-search-stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ fileNames: files, query: q })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        let sseBuffer = ""; 
        let fullHTML = ""; 

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            
            sseBuffer += decoder.decode(value, { stream: true });
            const lines = sseBuffer.split('\n\n'); 
            sseBuffer = lines.pop();
            
            for (const line of lines) {
                if (line.startsWith('data: ')) {
                    try {
                        const data = JSON.parse(line.substring(6));
                        if (data.text) {
                            fullHTML += data.text;
                            resDiv.innerHTML = fullHTML;
                        }
                        if (data.error) resDiv.innerHTML = `<span style="color:red">Errore: ${data.error}</span>`;
                    } catch (e) {
                        console.log("Errore parsing chunk");
                    }
                }
            }
            resDiv.scrollTop = resDiv.scrollHeight;
        }

        // --- 🚀 TASTO ESPORTAZIONE (Appare a fine analisi) ---
  // --- 🚀 FIX: DOPPIO TASTO (VOCE + SALVA) ---
        if (fullHTML && fullHTML.length > 10) {
            const actionsId = `actions-${cardId}`;
            
            if (!document.getElementById(actionsId)) {
                // Creiamo un contenitore flex per tenere i bottoni affiancati
                const btnBox = document.createElement('div');
                btnBox.id = actionsId;
                btnBox.style.cssText = "display:flex; gap:10px; margin-top:20px; width:100%;";

                // 1. TASTO VOCE (Legge l'analisi completa)
                const voiceBtn = document.createElement('button');
                voiceBtn.className = 'card-btn';
                voiceBtn.style.cssText = "background:#22d3ee; color:#0b1020; font-weight:900; flex:1;";
                voiceBtn.innerHTML = "🔊 LEGGI ANALISI";
                voiceBtn.onclick = () => {
                    // Estraiamo solo il testo della ricerca (ignorando i tasti stessi)
                    const researchText = resDiv.innerText.split('🔊')[0].trim();
                    window.KebloVoice.speak(researchText, voiceBtn);
                };

                // 2. TASTO ESPORTAZIONE (Salva nello Scratchpad)
                const exportBtn = document.createElement('button');
                exportBtn.className = 'card-btn';
                exportBtn.style.cssText = "background:#4ade80; color:#0b1020; font-weight:900; flex:1;";
                exportBtn.innerHTML = "💾 SALVA REPORT";
                
                exportBtn.onclick = async () => {
                    exportBtn.disabled = true;
                    exportBtn.innerHTML = "SALVATAGGIO...";
                    try {
                        const res = await fetch("/api/export-to-scratchpad", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ 
                                title: "REPORT: " + q.substring(0, 25) + "...", 
                                content: fullHTML 
                            })
                        });
                        const result = await res.json();
                        if (result.ok) {
                            exportBtn.style.background = "#22d3ee";
                            exportBtn.innerHTML = "✅ SALVATO";
                            logToCard(cardId, "Report esportato nello Scratchpad.");
                            window.dispatchEvent(new CustomEvent('refresh-scratchpad'));
                        }
                    } catch (err) {
                        exportBtn.disabled = false;
                        exportBtn.innerHTML = "⚠️ ERRORE";
                    }
                };

                // Aggiungiamo i bottoni al contenitore e il contenitore al div dei risultati
                btnBox.appendChild(voiceBtn);
                btnBox.appendChild(exportBtn);
                resDiv.appendChild(btnBox);
                
                resDiv.scrollTop = resDiv.scrollHeight;
            }
        }} catch (err) {
        resDiv.innerHTML = "<strong>Errore di connessione.</strong>";
    }
}

                const data = JSON.parse(line.substring(6));

                if (data.type === "chunk" && data.text) {
                  if (!contentReceived) {
                    msgDiv.innerText = "";

                    contentReceived = true;

                  // Scroll automatico per seguire il testo

                // 2. GESTIONE FINE RISPOSTA (DONE)
                if (data.type === "done") {
                  if (!contentReceived && data.reply) {
                    msgDiv.innerHTML = marked.parse(data.reply);
                    msgDiv.style.opacity = "1";

                  if (data.card) {
                    spawnCard(data.card.type, data.card.title, data.card.content, data.card.status);
                  }
                  updateTokens(data.meta);
                }

                if (data.type === "error") {
                  msgDiv.innerHTML = `<span style="color:red">Errore: ${data.error}</span>`;
                }
              } catch (e) { console.error("Parsing error", e); }
            }
          }
        }

async function sendNexusMessage(text) {
  const placeholder = document.getElementById("nexus-placeholder");
  const outText = document.getElementById("nexus-out-text");
  const mascot = document.getElementById("keblo-mascot"); // <--- PRENDI MASCOTTE
  
  // 1. ATTIVA MASCOTTE (BUSY)
  mascot.classList.add("busy");
   // 🚀 ANIMAZIONE "ANALYZING..." (Inserisci QUESTA RIGA QUI)
  const tkInfo = document.getElementById("nexus-token-info"); // <--- Se non esiste, non succede nulla
   if(tkInfo) {
    tkInfo.innerHTML = `
      <div style="display:flex; align-items:center; gap:8px; opacity:0.6;">
        <div class="loading-spinner" style="width:10px; height:10px; border-width:2px;"></div>
        <span style="font-size:9px; letter-spacing:1px; color:#818cf8; font-family:var(--font-mono);">ANALYZING...</span>
      </div>
    `;
  }
  // TROVA IL RETRO DELLA CARD
  const chatCard = document.querySelector('.card.chat');
  const historyList = chatCard ? document.getElementById(`history-${chatCard.id}`) : null;

  // LOG IMMEDIATO DEL PROMPT
  if (historyList) {
    const time = new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
    const logItem = document.createElement('div');
    logItem.className = 'history-item';
    logItem.style.borderLeft = "2px solid var(--a-chat)";
    logItem.style.paddingLeft = "10px";
    logItem.innerHTML = `
      <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
        <span style="color:var(--a-chat); font-weight:900; font-size:9px;">>>> PROMPT</span>
        <span style="opacity:0.3; font-size:8px;">${time}</span>
      </div>
      <div style="font-family:var(--font-mono); font-size:11px; opacity:0.8;">${text}</div>
    `;
    historyList.prepend(logItem);
  }

  // PREPARAZIONE INTERFACCIA
  if(placeholder) placeholder.style.display = "none";
  outText.style.display = "block";
  outText.innerHTML = `<span class="loading-spinner"></span> <span style="opacity:0.7; font-family:'Consolas', monospace; font-size:12px;">ELABORAZIONE...</span>`;

  let accumulatedText = "";
  let receivedAnyText = false;

  try {
    const response = await fetch("/api/chat", {
      credentials: "include",
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      const lines = chunk.split('\n\n');

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.substring(6).trim());

            if (data.type === "chunk" && data.text) {
              if (!receivedAnyText) { 
                outText.innerHTML = ""; 
                receivedAnyText = true; 
              }
              accumulatedText += data.text;
              outText.innerHTML = typeof marked !== 'undefined' ? marked.parse(accumulatedText) : accumulatedText;
            }
            
            if (data.type === "done") {
               const finalReply = accumulatedText || data.reply;
               if (!receivedAnyText && data.reply) {
                 outText.innerHTML = typeof marked !== 'undefined' ? marked.parse(data.reply) : data.reply;
               }
               

               // LOG DELLA RISPOSTA
               if (historyList) {
                  const logRes = document.createElement('div');
                  logRes.className = 'history-item';
                  logRes.style.borderLeft = "2px solid #4ade80";
                  logRes.style.paddingLeft = "10px";
                  logRes.style.marginTop = "5px";
                  logRes.style.background = "rgba(74, 222, 128, 0.03)";
                  logRes.innerHTML = `
                    <div style="color:#4ade80; font-weight:900; font-size:9px; margin-bottom:4px;"><<< RESPONSE</div>
                    <div style="font-family:var(--font-mono); font-size:10px; opacity:0.6;">${finalReply.substring(0, 300)}${finalReply.length > 300 ? '...' : ''}</div>
                  `;
                  historyList.prepend(logRes);
               }

               // 2. GESTIONE MASCOTTE POST-INFERENZA
                 mascot.classList.remove("busy");

                  const newMood = data.mood || 'calm';
                  console.log("Nuovo input emotivo:", newMood);

                  // 1. Applichiamo la "Media Ponderata" (L'emozione attuale sposta la media del 40%)
                  const targetHue = moodPalette[newMood] || 180;
                  
                  // Calcolo del mix: Keblo mantiene il 60% del colore precedente e assorbe il 40% del nuovo
                  emotionalMemory.hue = (emotionalMemory.hue * 0.6) + (targetHue * 0.4);
                  
                  // Più emozioni forti ci sono, più la saturazione aumenta (Keblo diventa più "carico")
                  if (newMood !== 'calm') {
                      emotionalMemory.saturation = Math.min(emotionalMemory.saturation + 0.5, 8);
                      emotionalMemory.brightness = Math.max(emotionalMemory.brightness - 0.05, 0.7);
                  } else {
                      // Se sei calmo, Keblo "guarisce" lentamente tornando limpido
                      emotionalMemory.saturation = Math.max(emotionalMemory.saturation - 0.3, 1);
                      emotionalMemory.brightness = Math.min(emotionalMemory.brightness + 0.05, 1.1);
                  }

                  // 2. Applichiamo il filtro dinamico calcolato
                  // Usiamo sepia(1) per resettare la base e hue-rotate per il mix
                  mascot.style.filter = `
                      sepia(1) 
                      saturate(${emotionalMemory.saturation}) 
                      hue-rotate(${emotionalMemory.hue - 50}deg) 
                      brightness(${emotionalMemory.brightness})
                      drop-shadow(0 0 20px hsla(${emotionalMemory.hue}, 100%, 50%, 0.4))
                  `;
              
               // --- 🚀 AGGIORNAMENTO METRICHE NEXUS ---
               if (data.meta) {
                 console.log(" [DEBUG] Meta ricevuto dal server:", data.meta); // LOG 2
                 const tkInfo = document.getElementById("nexus-token-info");
                 console.log(" [DEBUG] Elemento nexus-token-info trovato?", tkInfo); // LOG 3

               if (data.type === "done") {
               // ... (tua logica di chiusura, mascotte, etc.) ...
               
               // --- 🚀 AGGIORNAMENTO METRICHE FINALI ---
               const dashboard = document.getElementById("nexus-dashboard");
              if(dashboard) dashboard.style.display = "flex";

              // INIETTA LE METRICHE
              const tkInfo = document.getElementById("nexus-token-info");
              if (tkInfo && data.meta) {
                  const prompt = data.meta.promptTokens || 0;
                  const total = data.meta.tokenUsed || 0;
                  const speed = data.meta.speed || "0.00";

                  tkInfo.innerHTML = `
                    <div style="display:flex; gap:4px;">
                      <span style="color:#22d3ee; border:1px solid rgba(34,211,238,0.2); padding:2px 5px; border-radius:4px; font-size:12px; font-weight:900;">${prompt}<small>IN</small></span>
                      <span style="color:#818cf8; border:1px solid rgba(129,140,248,0.2); padding:2px 5px; border-radius:4px; font-size:12px; font-weight:900;">${total}<small>OUT</small></span>
                      <span style="color:#4ade80; border:1px solid rgba(74,222,128,0.2); padding:2px 5px; border-radius:4px; font-size:12px; font-weight:900;">⚡${speed}</span>
                    </div>
                  `;
              }
               
               // ... (resto del codice: confidence, v-controls, etc.) ...
            } 
               }
               if (data.card) spawnCard(data.card.type, data.card.title, data.card.content);
               
               window.lastAssistantTs = data.ts;
               const confBar = document.getElementById("confidence-bar");
               if(confBar) confBar.style.display = "block";
               const vControls = document.getElementById("v-controls"); // <--- NUOVO
               if(vControls) vControls.style.display = "flex";          // <--- NUOVO
            }
          } catch (e) {}
        }
      }
    }
  } catch (err) {
    outText.innerHTML = `<span style="color:#ef4444;">ERRORE DI CONNESSIONE.</span>`;
    mascot.classList.remove("busy"); // Libera la mascotte
  }
}

async function runVisionBatch(cardId) {

    const resDiv = document.getElementById(`v-res-${cardId}`);
    const btn = document.getElementById(`v-btn-${cardId}`);
    const count = parseInt(document.getElementById(cardId).dataset.batchCount) || 1;

    resDiv.innerHTML = ""; // Pulisce la galleria
    
    for (let i = 1; i <= count; i++) {

                method: "POST",

    if (parts.length === 3) {
        let y, m, d;
        // Se la prima parte è l'anno (es: 2026-4-19)
        if (parts[0].length === 4) {

            [d, m, y] = parts;

// Navigazione Mesi
function changeMonth(cardId, delta) {
  const card = document.getElementById(cardId);
  let m = parseInt(card.dataset.month) + delta;
  let y = parseInt(card.dataset.year);
  if (m > 11) { m = 0; y++; }
  if (m < 0) { m = 11; y--; }
  card.dataset.month = m;
  card.dataset.year = y;
  renderCalendar(cardId);
}

// Rendering della Griglia
async function renderCalendar(cardId) {
  const card = document.getElementById(cardId);
  const m = parseInt(card.dataset.month);
  const y = parseInt(card.dataset.year);
  const grid = document.getElementById(`cal-grid-${cardId}`);
  const title = document.getElementById(`cal-month-title-${cardId}`);
  
  const monthNames = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
  title.innerText = `${monthNames[m]} ${y}`;

  // Recupera eventi dal server per evidenziare i giorni
  const res = await fetch("/api/reminders", { credentials: "include" });
  const data = await res.json();
  const reminders = data.reminders || [];

  grid.innerHTML = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'].map(d => `<div class="cal-day-name">${d}</div>`).join('');

  const firstDay = new Date(y, m, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const daysInMonth = new Date(y, m + 1, 0).getDate();

  // Giorni vuoti mese precedente
  for(let i=0; i<offset; i++) grid.innerHTML += `<div class="cal-day other-month"></div>`;

  // Giorni del mese
  const today = new Date();
  for(let d=1; d<=daysInMonth; d++) {
    const isToday = today.getDate() === d && today.getMonth() === m && today.getFullYear() === y;
    
    // Controlla se ci sono eventi in questo giorno
    const hasEvent = reminders.some(r => {
      const dAt = new Date(r.dueAt);
      return dAt.getDate() === d && dAt.getMonth() === m && dAt.getFullYear() === y;
    });

    grid.innerHTML += `
      <div class="cal-day ${isToday?'today':''} ${hasEvent?'has-event':''}" 
           onclick="showEventsForDay('${cardId}', ${d}, ${m}, ${y})">
        ${d}
      </div>`;
  }
}

/* --- LOGICA RSS FEEDER --- */// --- CARICAMENTO FEED (CON FILTRO SCADENZA) ---
async function loadAllFeeds(cardId, topics) {
  const listContainer = document.getElementById(`rss-feed-${cardId}`);
  if (!listContainer) return;

  let allNews = [];
  
  // --- IMPOSTA IL LIMITE DI ETÀ DELLE NOTIZIE ---
  const MAX_DAYS_OLD = 7; // Scarta le notizie più vecchie di 7 giorni
  const maxAgeMs = MAX_DAYS_OLD * 24 * 60 * 60 * 1000;
  const now = Date.now();

  const shuffled = topics.sort(() => 0.5 - Math.random()).slice(0, 3);

  for (const topic of shuffled) {
    try {
      const res = await fetch("/api/fetch-rss", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        credentials: "include",
        body: JSON.stringify({ topic })
      });
      
      const xmlText = await res.text();
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xmlText, "text/xml");
      const items = xmlDoc.querySelectorAll("item");

      let addedForThisTopic = 0;

      items.forEach((item) => {
        if (addedForThisTopic >= 10) return; // Max 10 notizie RECENTI per topic

        // Estrai la data della notizia
        const pubDateStr = item.querySelector("pubDate") ? item.querySelector("pubDate").textContent : null;
        const articleDate = new Date(pubDateStr || now).getTime();

        // FILTRO: È più vecchia di 7 giorni?
        if ((now - articleDate) < maxAgeMs) {
          allNews.push({
            title: item.querySelector("title").textContent,
            link: item.querySelector("link").textContent,
            date: new Date(articleDate),
            source: topic
          });
          addedForThisTopic++; // Contiamo solo se l'abbiamo effettivamente aggiunta
        }
      });

    } catch (e) { 
      console.log("RSS Fail for", topic); 
    }
  }

  // Ordina tutto dal più recente al più vecchio
  allNews.sort((a, b) => b.date - a.date);

  // Se dopo il filtro non è rimasto nulla di recente:
  if (allNews.length === 0) {
    listContainer.innerHTML = `
      <div style="text-align:center; padding:30px; opacity:0.5;">
        <div style="font-size:24px; margin-bottom:10px;">⏳</div>
        <div>Nessuna notizia recente (ultimi ${MAX_DAYS_OLD} giorni).</div>
      </div>`;
    return;
  }

  // Altrimenti, renderizza la lista pulita
  renderRssList(cardId, allNews);
}

      <!-- Tasto MODIFICA (Matita) -->
      <span onclick="renameRssInterest('${cardId}', '${tag}')" 
            style="opacity:0.6; font-size:10px; cursor:pointer; padding:2px;" 
            title="Modifica nome">✏️</span>

      <!-- Tasto RIMUOVI (X) -->
      <span onclick="removeRssInterest('${cardId}', '${tag}')" 
            style="opacity:0.6; font-size:10px; cursor:pointer; padding:2px; color:#fb7185;"

    </span>
  `).join('');
}

// 1. Carica lo storico
// --- FUNZIONI DIARIO PULITE ---
function getDiaryTimeAgo(dateStr) {
  if (!dateStr) return "tempo ignoto";
  const now = new Date();
  const then = new Date(dateStr);
  const diffInMs = now - then;
  const diffInMins = Math.floor(diffInMs / 60000);

  if (diffInMins < 1) return "proprio ora";
  if (diffInMins < 60) return `${diffInMins} min fa`;
  if (diffInMins < 1440) return `${Math.floor(diffInMins / 60)} ore fa`;
  if (diffInMins < 2880) return "ieri";
  
  // Se è più vecchio di 2 giorni, mettiamo la data semplice
  return then.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
}

//Funzione caricamento History Diario nella Card
async function loadDiaryHistory(cid) {
  const container = document.getElementById(`diary-feed-${cid}`);
  try {
    const r = await fetch("/api/diary-history");
    const h = await r.json();
    
    if (h && h.length > 0) {
        container.innerHTML = h.map(x => {
            const quando = getDiaryTimeAgo(x.date);
            return `
            <div class="timeline-entry">
                <div class="timeline-dot"></div>
                <div class="timeline-time">${quando}</div>
                <div class="timeline-card">
                    <div class="timeline-user-msg">${x.user}</div>
                    <div class="timeline-ai-msg">
                        <span style="color:var(--a-journal); font-weight:900; font-style:normal;">AI:</span> ${x.ai}
                    </div>
                </div>
            </div>`;
        }).join('');
    }
  } catch (e) { console.log("Diario offline"); }
}

//Funzione invio Messaggio nel Diario
async function sendDiaryMessage(cid, t) {

//Funzione rendedRss
function renderRssList(cardId, newsArray) {
  const listContainer = document.getElementById(`rss-feed-${cardId}`);
  if(!listContainer) return;

  // Ordina per data (se possibile) o mischia per effetto "feed vivo"
  // Qui mischiamo per non avere blocchi monolitici
  newsArray.sort(() => 0.5 - Math.random());

  listContainer.innerHTML = newsArray.map(item => {
    // Formattiamo la data in modo breve
    let timeStr = "";
    if (item.date) {
      const d = new Date(item.date);
      timeStr = `${d.getHours()}:${d.getMinutes().toString().padStart(2, '0')}`;
    }

    return `
      <div class="rss-item">
        <div class="rss-meta" style="margin-bottom:2px; color:#6366f1;">
          <span>${item.source.toUpperCase()}</span>
          <span>${timeStr}</span>
        </div>
        <!-- Cliccando il titolo si apre il Reader Interno -->
        <div class="rss-title" onclick="openDeepReader('${item.link}', '${item.title.replace(/'/g, "\\'")}')">
          ${item.title}
        </div>
      </div>
    `;
  }).join('');
  
  logToCard(cardId, `Feed aggiornato: ${newsArray.length} nuove notizie.`);
}

// --- FUNZIONE APERTURA READER ---    // --- FUNZIONE APERTURA READER (SINGLE INSTANCE) ---
    async function openDeepReader(url, title) {
  let card = document.querySelector('.card.reader');
  let cardId;

  if (!card) {
    spawnCard("reader", "DEEP READER", "", { width: "500px", height: "600px", top: "100px", left: "100px" });
    card = document.querySelector('.card.reader'); 
  } else {
    card.classList.remove('minimized-to-dock');
    const dockItem = document.getElementById(`dock-item-${card.id}`);
    if(dockItem) dockItem.remove();
    if(document.getElementById('dock').children.length === 0) document.getElementById('dock').classList.remove('active');
    highestZ++;
    card.style.zIndex = highestZ;
  }

  cardId = card.id;
  const contentDiv = document.getElementById(`content-${cardId}`);

  contentDiv.innerHTML = `
    <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#64748b;">
      <div class="loading-spinner"></div>
      <div style="margin-top:15px; font-weight:bold; font-size:12px;">LETTURA E CROSS-CHECKING...</div>
    </div>
  `;

  try {
    const res = await fetch("/api/deep-read", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url })
    });
    const data = await res.json();

    if (data.ok) {
      contentDiv.innerHTML = `
        <!-- IMMAGINE -->
        ${data.articleImage ? `
          <div style="margin-bottom:20px; width:100%;">
            <img src="${data.articleImage}" style="width:100%; max-height:280px; object-fit:cover; border-radius:14px; border:1px solid rgba(255,255,255,0.12); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
          </div>
        ` : ''}

        <!-- HEADER CON TASTO VERIFICA -->
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:15px; margin-bottom:10px;">
          <div class="reader-title" style="flex:1; margin:0;">${title}</div>
          <button class="card-btn" style="width:auto; padding:6px 12px; background:#a855f7; color:white; font-size:9px; white-space:nowrap;" 
                  onclick="runFactCheck('${cardId}', '${title.replace(/'/g, "\\'")}')">🔍 VERIFICA FONTI</button>
        </div>
        
        <div class="reader-source" style="font-size:11px; opacity:0.6; margin-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">
          FONTE: <a href="${url}" target="_blank" style="color:#22d3ee; text-decoration:none;">Apri originale ↗</a>
        </div>

        <!-- AREA REPORT FACT-CHECK (Nascosta all'inizio) -->
        <div id="fc-res-${cardId}" style="display:none; background:rgba(168, 85, 247, 0.1); border:1px solid rgba(168, 85, 247, 0.3); border-radius:12px; padding:12px; margin-bottom:20px; font-size:13px; line-height:1.5;">
        </div>

        <!-- TESTO RIASSUNTO -->
        <div class="reader-text" style="color:#e2e8f0; font-family:'Georgia',serif; line-height:1.7; font-size:15px;">
          ${data.summary.replace(/\n/g, '<br>')}
        </div>
      `;
    } else {
      contentDiv.innerHTML = `<div style="padding:20px; color:#ef4444;">Errore: ${data.error}</div>`;
    }
  } catch (e) {
    contentDiv.innerHTML = `<div style="padding:20px; color:#ef4444;">Errore di connessione.</div>`;
  }
}

// 🚀 AGGIUNGI ANCHE QUESTA FUNZIONE SOTTO
async function runFactCheck(cardId, title) {
  const resDiv = document.getElementById(`fc-res-${cardId}`);
  const summaryText = document.querySelector(`#content-${cardId} .reader-text`).innerText;
  
  resDiv.style.display = "block";
  resDiv.innerHTML = `<div class="loading-spinner" style="width:12px; height:12px;"></div> <span style="font-size:10px; font-weight:900; letter-spacing:1px; margin-left:10px;">ANALISI CROSS-SOURCE IN CORSO...</span>`;

  try {
    const res = await fetch("/api/fact-check", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, originalSummary: summaryText })
    });
    const data = await res.json();
    
    if (data.ok) {
      resDiv.innerHTML = `
        <div style="font-size:9px; font-weight:900; color:#a855f7; margin-bottom:8px; letter-spacing:1.5px; text-transform:uppercase;">🛡️ Fact-Check Report:</div>
        <div style="color:rgba(233, 213, 255, 0.9);">${typeof marked !== 'undefined' ? marked.parse(data.report) : data.report}</div>
      `;
    } else {
      resDiv.innerHTML = "⚠️ Impossibile completare la verifica al momento.";
    }
  } catch (e) {
    resDiv.innerHTML = "⚠️ Errore di connessione al modulo Intelligence.";
  }
}

// --- OROLOGIO IN TEMPO REALE ---
function startSystemClock() {
      const timeEl = document.getElementById('clock-time');
      const dateEl = document.getElementById('clock-date');
      
      // Controllo di sicurezza: se non trova gli elementi, riprova tra poco
      if (!timeEl || !dateEl) {
        console.warn("Clock elements not found, retrying...");
        setTimeout(startSystemClock, 500);
        return;
      }

      function update() {
        const now = new Date();
        
        // ORARIO
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        timeEl.innerText = `${hours}:${minutes}`;

        // DATA
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        // Mettiamo la prima lettera maiuscola per eleganza
        let dateStr = now.toLocaleDateString('it-IT', options);
        dateStr = dateStr.charAt(0).toUpperCase() + dateStr.slice(1);
        
        dateEl.innerText = dateStr;
      }

      update(); // Aggiorna subito
      setInterval(update, 1000); // Poi ogni secondo
    }

// Funzione filtro manuale (clic sui tag in alto)
async function filterRss(cardId, topic) {
  const listContainer = document.getElementById(`rss-feed-${cardId}`);
  listContainer.innerHTML = `<div class="loading-spinner"></div> Caricamento ${topic}...`;
  
  // Evidenzia il tag
  const tags = document.getElementById(`rss-tags-${cardId}`).children;
  for(let t of tags) t.classList.remove('active');
  event.target.classList.add('active');

  // Carica solo quel topic
  loadAllFeeds(cardId, [topic]); 
  // Nota: loadAllFeeds è fatta per array, gli passiamo un array di 1 elemento
}
